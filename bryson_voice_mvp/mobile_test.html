<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bryson语音MVP - 移动端测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #4CAF50;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .status-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .status-label {
            color: #666;
            font-weight: 500;
        }
        
        .status-value {
            color: #333;
            font-weight: bold;
        }
        
        .status-good {
            color: #4CAF50 !important;
        }
        
        .status-warning {
            color: #FF9800 !important;
        }
        
        .test-buttons {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            width: 100%;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        
        .btn-success:hover {
            background: #43a047;
        }
        
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }
        
        .test-result.show {
            display: block;
        }
        
        .test-result p {
            margin: 10px 0;
            color: #2e7d32;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .btn {
                padding: 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎤</div>
            <h1>Bryson语音MVP测试版</h1>
            <p class="subtitle">移动端兼容性测试 - 专为蓝牙耳机优化</p>
        </div>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">连接状态</span>
                <span id="connectionStatus" class="status-value status-good">✅ 已连接</span>
            </div>
            <div class="status-item">
                <span class="status-label">测试会话</span>
                <span id="sessionId" class="status-value">测试-2026-03-31</span>
            </div>
            <div class="status-item">
                <span class="status-label">移动端适配</span>
                <span id="mobileStatus" class="status-value status-good">✅ 已优化</span>
            </div>
            <div class="status-item">
                <span class="status-label">音频设备</span>
                <span id="audioStatus" class="status-value status-warning">需要授权麦克风</span>
            </div>
        </div>
        
        <div class="test-buttons">
            <button class="btn btn-primary" onclick="testAudioDevices()">
                🔊 测试音频设备
            </button>
            
            <button class="btn btn-secondary" onclick="checkMicrophone()">
                🎤 检查麦克风权限
            </button>
            
            <a href="/static/index.html" class="btn btn-success" target="_blank">
                🚀 进入完整测试界面
            </a>
        </div>
        
        <div id="testResult" class="test-result">
            <!-- 测试结果会显示在这里 -->
        </div>
    </div>
    
    <script>
        // 更新会话ID为当前时间
        document.getElementById('sessionId').textContent = 
            '测试-' + new Date().toISOString().slice(0, 10);
        
        // 自动检测移动端
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        document.getElementById('mobileStatus').textContent = 
            isMobile ? '✅ 移动端检测成功' : '✅ 桌面端';
        
        async function testAudioDevices() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '<p>正在测试音频设备...</p>';
            resultDiv.classList.add('show');
            
            try {
                // 测试音频输出
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 440; // A4音
                gainNode.gain.value = 0.05;
                
                oscillator.start();
                
                setTimeout(() => {
                    oscillator.stop();
                    resultDiv.innerHTML = `
                        <p>✅ 测试音频播放成功！</p>
                        <p>如果您听到了440Hz的测试音，说明扬声器工作正常。</p>
                        <p>如果使用蓝牙耳机，请确保耳机已连接并设置为音频输出设备。</p>
                    `;
                    
                    // 继续测试麦克风
                    checkMicrophone();
                }, 1000);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <p>❌ 音频测试失败</p>
                    <p>错误: ${error.message}</p>
                    <p>请检查浏览器音频权限或尝试切换音频输出设备。</p>
                `;
            }
        }
        
        async function checkMicrophone() {
            const resultDiv = document.getElementById('testResult');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioStatus = document.getElementById('audioStatus');
                audioStatus.textContent = '✅ 麦克风已授权';
                audioStatus.className = 'status-value status-good';
                
                resultDiv.innerHTML += `
                    <p>✅ 麦克风权限已获取！</p>
                    <p>设备: ${stream.getAudioTracks()[0].label || '默认麦克风'}</p>
                    <p>您现在可以进入完整测试界面进行语音测试。</p>
                `;
                
                // 停止所有轨道
                stream.getTracks().forEach(track => track.stop());
                
            } catch (error) {
                resultDiv.innerHTML += `
                    <p>❌ 麦克风权限被拒绝</p>
                    <p>请在浏览器设置中允许麦克风访问，然后刷新页面重试。</p>
                    <p>对于iOS设备，需要手动启用"Safari->设置->网站设置->麦克风"权限。</p>
                `;
            }
        }
        
        // 页面加载时检查基本状态
        window.addEventListener('load', () => {
            // 检查页面是否通过HTTPS加载（WebRTC要求）
            if (window.location.protocol !== 'https:' && !window.location.hostname.includes('localhost')) {
                alert('⚠️ 建议使用HTTPS连接以获得最佳WebRTC兼容性');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OPC 看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e1a;color:#e8e8ee;font:13px/1.5 -apple-system,sans-serif;display:flex;min-height:100vh}
::selection{background:rgba(120,200,255,.25)}

/* Sidebar */
nav{width:200px;background:rgba(255,255,255,.025);border-right:1px solid rgba(255,255,255,.05);padding:16px 0;flex-shrink:0;display:flex;flex-direction:column}
nav .logo{font:bold 15px "Times New Roman",serif;color:#fff;padding:0 16px 16px;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:8px}
nav .nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;color:rgba(255,255,255,.4);cursor:pointer;font-size:12px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
nav .nav-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.03)}
nav .nav-item.sel{color:#fff;background:rgba(120,200,255,.08);border-right:2px solid rgba(120,200,255,.5)}
nav .badge{font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(120,200,255,.15);color:rgba(120,200,255,.7);margin-left:auto}
nav .refresh{font-size:10px;color:rgba(255,255,255,.15);padding:16px;margin-top:auto;text-align:center}

main{flex:1;overflow-y:auto;padding:20px 24px}
.page{display:none}
.page.show{display:block}

/* Agent Grid */
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.agent-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;position:relative}
.agent-card .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.agent-card .name{font:bold 18px "Times New Roman",serif;color:#fff}
.agent-card .role{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.agent-card .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;margin-bottom:8px}
.status-active{background:rgba(100,220,160,.1);color:rgba(100,220,160,.8);border:1px solid rgba(100,220,160,.2)}
.status-idle{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1)}
.status-unknown{background:rgba(255,210,60,.08);color:rgba(255,210,60,.7);border:1px solid rgba(255,210,60,.15)}
.agent-card .meta{font-size:10px;color:rgba(255,255,255,.2);margin-bottom:12px}
.agent-card .add-btn{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.agent-card .add-btn:hover{background:rgba(120,200,255,.12);border-color:rgba(120,200,255,.35);color:rgba(120,200,255,.8)}

/* Task columns */
.task-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.task-col{font-size:11px}
.task-col-title{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-bottom:6px}
.task-item{padding:5px 8px;background:rgba(255,255,255,.03);border-radius:6px;margin-bottom:3px;font-size:11px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:6px;border:1px solid transparent;cursor:pointer;transition:all .1s}
.task-item:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.06)}
.task-item .task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-pending{background:rgba(255,210,60,.55)}.dot-progress{background:rgba(80,170,255,.55)}.dot-done{background:rgba(100,230,180,.55)}
.task-item .task-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-item .task-link{font-size:9px;color:rgba(120,200,255,.6);cursor:pointer;text-decoration:none;flex-shrink:0;padding:1px 4px;border-radius:4px}
.task-item .task-link:hover{color:rgba(120,200,255,1);background:rgba(120,200,255,.1)}
.task-actions{display:none;gap:4px}
.task-item:hover .task-actions{display:flex}
.task-act-btn{font-size:9px;padding:1px 6px;border-radius:4px;border:none;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.task-act-btn:hover{background:rgba(120,200,255,.15);color:rgba(120,200,255,.8)}

/* Core Projects section */
.core-projects{border-top:1px solid rgba(255,255,255,.05);padding-top:12px}
.core-projects .cp-title{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-bottom:8px}
.cp-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.cp-item .cp-name{color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cp-item .cp-phase{color:rgba(255,255,255,.2);font-size:10px;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-bar{width:60px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;flex-shrink:0}
.cp-fill{height:100%;border-radius:2px}
.cp-pct{font-size:9px;color:rgba(255,255,255,.15);width:28px;text-align:right;flex-shrink:0}

/* Panel B: Artifacts */
.artifacts-layout{display:flex;gap:16px;height:calc(100vh - 120px)}
.artifacts-list{width:300px;flex-shrink:0;overflow-y:auto;background:rgba(255,255,255,.02);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.05)}
.filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:none;color:rgba(255,255,255,.35);font-size:10px;cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.sel{background:rgba(120,200,255,.1);border-color:rgba(120,200,255,.35);color:rgba(120,200,255,.8)}
.artifact-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.55);margin-bottom:2px;display:flex;align-items:center;gap:8px;transition:all .1s}
.artifact-item:hover,.artifact-item.sel{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.artifact-item .a-icon{font-size:14px;width:20px;text-align:center}
.artifact-item .a-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.artifact-item .a-size{font-size:9px;color:rgba(255,255,255,.15)}
.artifact-item .a-type{font-size:8px;padding:1px 5px;border-radius:6px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.25)}
.preview-panel{flex:1;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.01)}
.preview-panel iframe{flex:1;border:none;background:#fff}
.preview-empty{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.12);font-size:14px}

/* === Panel C: Workflow Editor === */
.workflow-layout{display:flex;gap:0;height:calc(100vh - 120px);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.wf-sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,.02);border-right:1px solid rgba(255,255,255,.05);padding:14px;overflow-y:auto}
.wf-sidebar h3{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px;margin-bottom:10px}
.wf-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.45);margin-bottom:2px;transition:all .1s;display:flex;align-items:center;justify-content:space-between}
.wf-item:hover,.wf-item.sel{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.wf-item .wf-del{font-size:12px;color:rgba(255,100,100,.4);cursor:pointer;padding:0 4px;opacity:0;transition:opacity .1s}
.wf-item:hover .wf-del{opacity:1}
.wf-add-btn{width:100%;padding:8px;border-radius:8px;border:1px dashed rgba(255,255,255,.08);background:none;color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;margin-top:8px;transition:all .15s}
.wf-add-btn:hover{border-color:rgba(120,200,255,.3);color:rgba(120,200,255,.7)}
.wf-canvas{flex:1;position:relative;background:rgba(255,255,255,.01)}
.wf-canvas .react-flow{background:rgba(255,255,255,.01)}
.wf-toolbar{position:absolute;top:12px;left:12px;z-index:10;display:flex;gap:6px}
.wf-toolbar button{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.6);color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px)}
.wf-toolbar button:hover{background:rgba(120,200,255,.15);border-color:rgba(120,200,255,.35);color:#fff}
.wf-toolbar button.primary{background:rgba(120,200,255,.15);border-color:rgba(120,200,255,.25);color:rgba(120,200,255,.9)}
.wf-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.1);pointer-events:none}
.wf-empty .icon{font-size:40px;margin-bottom:10px}
.wf-empty .text{font-size:13px}
.wf-empty .hint{font-size:10px;color:rgba(255,255,255,.05);margin-top:4px}

/* React Flow overrides */
.react-flow__node{font-size:12px!important}
.react-flow__node-taskNode{border-radius:10px!important;border:1px solid rgba(255,255,255,.12)!important;background:rgba(20,20,40,.95)!important;padding:0!important;min-width:180px!important;backdrop-filter:blur(8px)}
.react-flow__node-taskNode .node-inner{padding:12px 14px}
.react-flow__node-taskNode .node-agent{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:4px}
.react-flow__node-taskNode .node-label{font-size:13px;color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.react-flow__node-taskNode .node-meta{display:flex;gap:12px;margin-top:6px;font-size:10px;color:rgba(255,255,255,.3)}
.react-flow__edge-path{stroke:rgba(255,255,255,.15)!important;stroke-width:1.5!important}
.react-flow__handle{width:8px!important;height:8px!important;background:rgba(255,255,255,.3)!important;border:1px solid rgba(255,255,255,.1)!important}
.react-flow__controls button{background:rgba(0,0,0,.6)!important;border-color:rgba(255,255,255,.1)!important;fill:rgba(255,255,255,.5)!important}
.react-flow__minimap{background:rgba(0,0,0,.4)!important}

/* Node property editor (right sidebar) */
.node-editor{position:absolute;top:12px;right:12px;z-index:10;width:220px;background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;backdrop-filter:blur(12px);display:none}
.node-editor.show{display:block}
.node-editor label{display:block;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-bottom:3px}
.node-editor input,.node-editor select{width:100%;padding:6px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#fff;font-size:11px;margin-bottom:8px;outline:none}
.node-editor input:focus,.node-editor select:focus{border-color:rgba(120,200,255,.35)}
.node-editor .ne-btns{display:flex;gap:6px}
.node-editor .ne-btns button{flex:1;padding:5px;border-radius:6px;border:none;font-size:10px;cursor:pointer}
.ne-apply{background:rgba(120,200,255,.15);color:rgba(120,200,255,.9)}
.ne-apply:hover{background:rgba(120,200,255,.25)}

/* === Panel D: Cost Dashboard === */
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cost-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px}
.cost-card h3{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;margin-bottom:12px}
.stat-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.03);border-radius:10px;padding:14px;text-align:center}
.stat-card .val{font:bold 24px "Times New Roman",serif;color:#fff}
.stat-card .lbl{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.bar-row .bar-label{width:70px;font-size:10px;color:rgba(255,255,255,.4);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bar-track{flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.bar-row .bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-row .bar-val{width:40px;font-size:10px;color:rgba(255,255,255,.2);text-align:right}
.model-chips{display:flex;flex-wrap:wrap;gap:6px}
.model-chip{padding:4px 10px;border-radius:12px;background:rgba(255,255,255,.04);font-size:10px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.06)}
.model-chip span{color:rgba(255,255,255,.2);margin-left:4px}

/* === Panel E: Sandbox Tasks === */
.sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sb-section{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px}
.sb-section h3{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sb-section h3 .sb-badge{font-size:9px;padding:2px 8px;border-radius:8px}
.badge-ok{background:rgba(100,220,160,.1);color:rgba(100,220,160,.7)}
.badge-warn{background:rgba(255,210,60,.1);color:rgba(255,210,60,.7)}
.badge-none{background:rgba(255,255,255,.05);color:rgba(255,255,255,.2)}
.task-table{width:100%;font-size:10px}
.task-table th{text-align:left;padding:6px 8px;color:rgba(255,255,255,.2);font-weight:400;border-bottom:1px solid rgba(255,255,255,.05)}
.task-table td{padding:6px 8px;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.02)}
.task-table .ts-ok{color:rgba(100,220,160,.6)}
.task-table .ts-err{color:rgba(255,100,100,.6)}
.task-table tr:hover td{background:rgba(255,255,255,.01)}
.empty-state{padding:40px;text-align:center;color:rgba(255,255,255,.08);font-size:12px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#12122a;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;width:420px;max-width:90vw}
.modal h3{font-size:15px;color:#fff;margin-bottom:16px}
.modal label{display:block;font-size:10px;color:rgba(255,255,255,.35);margin-bottom:4px;letter-spacing:1px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:13px;margin-bottom:12px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:rgba(120,200,255,.4)}
.modal textarea{height:80px;resize:vertical}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:8px 20px;border-radius:10px;font-size:12px;cursor:pointer;transition:all .15s;border:none}
.btn-cancel{background:rgba(255,255,255,.05);color:rgba(255,255,255,.45)}
.btn-cancel:hover{background:rgba(255,255,255,.1)}
.btn-submit{background:rgba(120,200,255,.12);color:rgba(120,200,255,.9)}
.btn-submit:hover{background:rgba(120,200,255,.22)}
.btn-danger{background:rgba(255,100,100,.08);color:rgba(255,100,100,.7)}
.btn-danger:hover{background:rgba(255,100,100,.18)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:20px;font-size:12px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{background:rgba(100,220,100,.12);color:rgba(100,220,160,.9)}
.toast.err{background:rgba(255,100,100,.12);color:rgba(255,100,100,.9)}

.section-title{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:2px;margin:0 0 16px;text-transform:uppercase}

@media(max-width:768px){
  nav{width:130px}
  .agent-grid,.cost-grid,.sb-grid{grid-template-columns:1fr}
  .artifacts-layout{flex-direction:column;height:auto}
  .artifacts-list{width:100%;max-height:200px}
  .wf-sidebar{width:140px}
  .stat-cards{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <div class="logo">OPC Dashboard</div>
  <button class="nav-item sel" data-panel="agents">Agent状态和任务</button>
  <button class="nav-item" data-panel="artifacts">产物与预览</button>
  <button class="nav-item" data-panel="workflow"><span>Workflow</span><span class="badge" id="wf-badge" style="display:none">0</span></button>
  <button class="nav-item" data-panel="cost">成本仪表盘</button>
  <button class="nav-item" data-panel="sandbox">沙箱任务</button>
  <div class="refresh" id="refresh-stamp"></div>
</nav>

<main>
  <!-- Panel A -->
  <div class="page show" id="page-agents">
    <div class="section-title">Agent Status &amp; Tasks</div>
    <div class="agent-grid" id="agent-grid"></div>
  </div>

  <!-- Panel B -->
  <div class="page" id="page-artifacts">
    <div class="section-title">Artifacts &amp; Preview</div>
    <div class="artifacts-layout">
      <div class="artifacts-list">
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn sel" data-filter="">全部</button>
          <button class="filter-btn" data-filter="web">Web</button>
          <button class="filter-btn" data-filter="doc">文档</button>
          <button class="filter-btn" data-filter="code">代码</button>
          <button class="filter-btn" data-filter="image">图片</button>
          <button class="filter-btn" data-filter="data">数据</button>
        </div>
        <div id="artifact-list"></div>
      </div>
      <div class="preview-panel">
        <div class="preview-empty" id="preview-empty">← 选择产物预览</div>
        <iframe id="preview-frame" style="display:none"></iframe>
      </div>
    </div>
  </div>

  <!-- Panel C: Workflow -->
  <div class="page" id="page-workflow">
    <iframe id="wf-iframe" src="/workflow-editor.html" style="width:100%;height:100%;border:none;border-radius:12px"></iframe>
  </div>

  <!-- Panel D: Cost -->
  <div class="page" id="page-cost">
    <div class="section-title">Cost Dashboard</div>
    <div id="cost-content"><div class="empty-state">Loading cost data...</div></div>
  </div>

  <!-- Panel E: Sandbox -->
  <div class="page" id="page-sandbox">
    <div class="section-title">Sandbox Tasks</div>
    <div class="sb-grid" id="sb-grid">
      <div class="sb-section"><h3>Containers <span class="sb-badge badge-none" id="sb-cont-badge">—</span></h3><div id="sb-containers"><div class="empty-state">Loading...</div></div></div>
      <div class="sb-section"><h3>Recent Tasks <span class="sb-badge badge-none" id="sb-task-badge">—</span></h3><div id="sb-tasks"><div class="empty-state">Loading...</div></div></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3 id="modal-title">New Task</h3>
    <label>Title</label>
    <input type="text" id="task-title" placeholder="Task title...">
    <label>Description</label>
    <textarea id="task-desc" placeholder="Task details..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="createTask()">Create &amp; Notify Agent</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- React + React Flow CDN (for Workflow editor) -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "@xyflow/react": "https://esm.sh/@xyflow/react@12.3.0"
  }
}
</script>

<script>
// ============ Shared State ============
let currentPanel='agents',currentAgentId=null,allTasks=[],allArtifacts=[],selArtifact=null,curFilter='',allProjects={};
let allWorkflows=[],currentWorkflowId=null;

// ============ Navigation ============
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>switchPanel(b.dataset.panel)));
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{
  curFilter=b.dataset.filter;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');renderArtifacts();
}));

function switchPanel(p){
  currentPanel=p;document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('sel'));
  document.querySelector(`[data-panel="${p}"]`).classList.add('sel');
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('show'));
  document.getElementById(`page-${p}`).classList.add('show');
  if(p==='agents') refreshAll();
  if(p==='artifacts') { fetchTasks();fetchArtifacts(); }
  if(p==='workflow') { document.getElementById('wf-iframe').src='/workflow-editor.html?'+Date.now(); }
  if(p==='cost') { fetchCosts(); }
  if(p==='sandbox') { fetchSandboxTasks(); }
}

async function api(url,opts){const r=await fetch(url,opts);return r.json();}

// ============ Panel A: Agents & Tasks ============
async function refreshAll(){
  try{
    const [ad,td,pd]=await Promise.all([api('/api/agents'),api('/api/tasks'),api('/api/projects')]);
    allTasks=td.tasks||[];allProjects=pd.projects||{};
    if(ad.ok) renderAgentGrid(ad.agents);
  }catch(e){console.warn(e)}
  updateTime();
}

async function fetchTasks(){try{allTasks=(await api('/api/tasks')).tasks||[]}catch(e){}}
async function fetchArtifacts(){try{allArtifacts=(await api('/api/artifacts')).artifacts||[];renderArtifacts()}catch(e){}}

function renderAgentGrid(agents){
  if(!agents||!agents.length) return;
  const grid=document.getElementById('agent-grid');
  grid.innerHTML=agents.map(a=>{
    const sc=a.status==='active'?'status-active':a.status==='idle'?'status-idle':'status-unknown';
    const color=a.color||'#888';
    const at=allTasks.filter(t=>t.agentId===a.id);
    const pending=at.filter(t=>t.status==='pending');
    const inProg=at.filter(t=>t.status==='in_progress');
    const done=at.filter(t=>t.status==='done').slice(-3);
    const cp=allProjects[a.id]||[];

    return `<div class="agent-card" style="border-left:2px solid ${color}33">
      <button class="add-btn" onclick="openNewTask('${a.id}','${a.name}')" title="New task">+</button>
      <div class="header"><div><div class="name" style="color:${color}">${esc(a.name)}</div><div class="role">${esc(a.role)}</div></div></div>
      <span class="status-badge ${sc}">${a.status==='active'?'● Online':a.status==='idle'?'○ Idle':'◇ Unknown'}</span>
      <div class="meta">Model: ${a.model||'—'}  ·  Sessions: ${a.sessionCount||0}  ·  ${a.lastActive?new Date(a.lastActive).toLocaleTimeString():'—'}</div>
      <div class="task-cols">
        <div class="task-col"><div class="task-col-title">PENDING (${pending.length})</div>
          ${pending.slice(0,4).map(t=>renderTaskItem(t,'pending')).join('')||'<div style="font-size:10px;color:rgba(255,255,255,.1)">—</div>'}
        </div>
        <div class="task-col"><div class="task-col-title">IN PROGRESS (${inProg.length})</div>
          ${inProg.slice(0,4).map(t=>renderTaskItem(t,'in_progress')).join('')||'<div style="font-size:10px;color:rgba(255,255,255,.1)">—</div>'}
        </div>
        <div class="task-col"><div class="task-col-title">DONE (last 3)</div>
          ${done.map(t=>renderTaskItem(t,'done')).join('')||'<div style="font-size:10px;color:rgba(255,255,255,.1)">—</div>'}
        </div>
      </div>
      ${cp.length?`<div class="core-projects"><div class="cp-title">CORE PROJECTS</div>
        ${cp.map(p=>`<div class="cp-item"><span class="cp-name">${esc(p.name)}</span><span class="cp-phase">${esc(p.phase)}</span><div class="cp-bar"><div class="cp-fill" style="width:${p.progress||0}%;background:${color}"></div></div><span class="cp-pct">${p.progress||0}%</span></div>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

function renderTaskItem(t,status){
  const dotClass={'pending':'dot-pending','in_progress':'dot-progress','done':'dot-done'}[status]||'dot-pending';
  const artLink=t.artifactLink?`<a class="task-link" onclick="event.stopPropagation();jumpToArtifact('${esc(t.artifactLink)}')" title="View artifact">↗</a>`:'';
  const actions=status!=='done'?`<span class="task-actions">
    ${status==='pending'?`<button class="task-act-btn" onclick="event.stopPropagation();moveTask('${t.id}','in_progress')" title="Start">▶</button>`:''}
    ${status==='in_progress'?`<button class="task-act-btn" onclick="event.stopPropagation();moveTask('${t.id}','done')" title="Complete">✓</button>`:''}
    <button class="task-act-btn" onclick="event.stopPropagation();deleteTask('${t.id}')" title="Delete">✕</button>
  </span>`:'';
  return `<div class="task-item" title="${esc(t.title)}${t.description?'\n'+esc(t.description):''}">
    <span class="task-dot ${dotClass}"></span><span class="task-text">${esc(t.title)}</span>${artLink}${actions}
  </div>`;
}

async function moveTask(id,newStatus){
  try{
    const r=await api(`/api/tasks/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});
    if(r.ok) refreshAll();
    else toast('Failed to update task','err');
  }catch(e){toast('Network error','err');}
}

async function deleteTask(id){
  try{
    const r=await api(`/api/tasks/${id}`,{method:'DELETE'});
    if(r.ok) refreshAll();
    else toast('Failed to delete','err');
  }catch(e){toast('Network error','err');}
}

function esc(s){return(String(s||'')).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function jumpToArtifact(link){
  if(!link) return toast('No artifact linked','err');
  switchPanel('artifacts');
  setTimeout(()=>{
    document.querySelectorAll('.artifact-item').forEach(el=>{if(el.querySelector('.a-name')?.textContent?.includes(link.split('/').pop()?.replace(/\.\w+$/,''))){el.click();el.scrollIntoView({block:'center'});}});
  },300);
}

function updateTime(){document.getElementById('refresh-stamp').textContent='Updated '+new Date().toLocaleTimeString();}

// ============ Panel B: Artifacts ============
function renderArtifacts(){
  const list=document.getElementById('artifact-list');
  const filtered=curFilter?allArtifacts.filter(a=>a.type===curFilter):allArtifacts;
  const icons={web:'🌐',doc:'📄',code:'💻',image:'🖼️',data:'📊',other:'📎'};
  const sizes=['B','KB','MB','GB'];
  list.innerHTML=filtered.length?filtered.map(a=>{
    let sz=a.size,si=0;while(sz>1024&&si<3){sz/=1024;si++}
    return `<div class="artifact-item ${selArtifact===a.path?'sel':''}" onclick="previewArtifact('${esc(a.path)}')" ondblclick="openArtifact('${esc(a.path)}','${a.type}')">
      <span class="a-icon">${icons[a.type]||'📎'}</span><span class="a-name">${esc(a.name)}</span><span class="a-type">${a.type}</span><span class="a-size">${sz.toFixed(1)}${sizes[si]}</span></div>`;
  }).join(''):'<div style="padding:24px;text-align:center;color:rgba(255,255,255,.1);font-size:12px">No artifacts</div>';
}

function previewArtifact(path){
  selArtifact=path;document.getElementById('preview-empty').style.display='none';
  const iframe=document.getElementById('preview-frame');iframe.style.display='block';iframe.src=path;
  renderArtifacts();
}

function openArtifact(path,type){
  if(type==='web') window.open(path,'_blank');
  else{const a=document.createElement('a');a.href=path;a.download=path.split('/').pop();a.click();}
}

// ============ Panel D: Cost Dashboard ============
async function fetchCosts(){
  const el=document.getElementById('cost-content');
  el.innerHTML='<div class="empty-state">Loading cost data...</div>';
  try{
    const r=await api('/api/costs');
    if(!r.ok||!r.costs){el.innerHTML='<div class="empty-state">No cost data available</div>';return;}
    const c=r.costs;
    const agentBreakdown=c.agentBreakdown||[];
    const modelBreakdown=c.modelBreakdown||[];
    const totalSessions=c.totalSessions||0;
    const tokens=c.tokens||0;
    const totalAgents=agentBreakdown.length;
    const totalModels=modelBreakdown.length;

    const maxSessions=Math.max(1,...agentBreakdown.map(a=>a.sessions));
    el.innerHTML=`
      <div class="stat-cards">
        <div class="stat-card"><div class="val">${totalSessions}</div><div class="lbl">Total Sessions</div></div>
        <div class="stat-card"><div class="val">${totalAgents}</div><div class="lbl">Active Agents</div></div>
        <div class="stat-card"><div class="val">${totalModels}</div><div class="lbl">Models Used</div></div>
      </div>
      <div class="cost-grid">
        <div class="cost-card">
          <h3>AGENT BREAKDOWN</h3>
          ${agentBreakdown.map(a=>`<div class="bar-row">
            <span class="bar-label">${esc(a.name||a.agent)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(a.sessions/maxSessions*100).toFixed(0)}%;background:${a.color||'#888'}"></div></div>
            <span class="bar-val">${a.sessions} sessions</span>
          </div>`).join('')||'<div class="empty-state">No data</div>'}
        </div>
        <div class="cost-card">
          <h3>MODEL USAGE</h3>
          <div class="model-chips">
            ${modelBreakdown.map(m=>`<div class="model-chip">${esc(m.model)} <span>×${m.sessions}</span></div>`).join('')||'<span class="empty-state">No data</span>'}
          </div>
        </div>
      </div>`;
  }catch(e){el.innerHTML='<div class="empty-state">Failed to load cost data</div>';}
}

// ============ Panel E: Sandbox & Tasks ============
async function fetchSandboxTasks(){
  try{
    const r=await api('/api/sandbox-tasks');
    if(!r.ok){return;}

    // Containers
    const containers=r.sandbox?.containers||[];
    const contBadge=document.getElementById('sb-cont-badge');
    contBadge.textContent=containers.length+' active';
    contBadge.className='sb-badge '+(containers.length?'badge-ok':'badge-none');
    document.getElementById('sb-containers').innerHTML=containers.length?containers.map(c=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.02)">
        <span style="color:rgba(255,255,255,.6)">${esc(c.name||c.id||'—')}</span>
        <span style="font-size:10px;color:rgba(100,220,160,.5)">● ${esc(c.status||'running')}</span>
      </div>`).join(''):'<div class="empty-state">No active containers</div>';

    // Tasks
    const tasks=r.tasks||[];
    const taskBadge=document.getElementById('sb-task-badge');
    const succeeded=tasks.filter(t=>t.status==='succeeded').length;
    const failed=tasks.filter(t=>t.status==='failed').length;
    taskBadge.textContent=tasks.length+' recent';
    taskBadge.className='sb-badge '+(failed?'badge-warn':tasks.length?'badge-ok':'badge-none');
    document.getElementById('sb-tasks').innerHTML=tasks.length?`
      <div style="max-height:400px;overflow-y:auto">
      <table class="task-table">
        <thead><tr><th>Task</th><th>Agent</th><th>Status</th><th>Time</th></tr></thead>
        <tbody>${tasks.slice(0,20).map(t=>{
          const dt=t.createdAt?new Date(t.createdAt):null;
          const timeStr=dt?dt.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
          return `<tr>
            <td title="${esc(t.summary||'')}">${esc((t.label||t.task||'—').substring(0,30))}</td>
            <td>${esc(t.agentId||'—')}</td>
            <td class="${t.status==='succeeded'?'ts-ok':t.status==='failed'?'ts-err':''}">${t.status}</td>
            <td>${timeStr}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`:'<div class="empty-state">No recent tasks</div>';
  }catch(e){console.warn('Sandbox fetch error',e)}
}

// ============ Task Modal ============
function openNewTask(agentId,agentName){
  currentAgentId=agentId;document.getElementById('modal-title').textContent=`New Task → ${agentName}`;
  document.getElementById('task-title').value='';document.getElementById('task-desc').value='';
  document.getElementById('task-modal').classList.add('show');document.getElementById('task-title').focus();
}
function closeModal(){document.getElementById('task-modal').classList.remove('show');currentAgentId=null;}

async function createTask(){
  const title=document.getElementById('task-title').value.trim();
  const desc=document.getElementById('task-desc').value.trim();
  if(!title) return toast('Title required','err');
  try{
    const r=await api('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agentId:currentAgentId,title,description:desc})});
    if(r.ok){closeModal();toast('✓ Task created. Agent will DM Daryl on Feishu.','ok');refreshAll();}
    else toast('✕ '+(r.error||'Failed'),'err');
  }catch(e){toast('✕ Network error','err');}
}

document.getElementById('task-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'ok');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}

refreshAll();setInterval(refreshAll,30000);

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();hideNodeEditor();}});

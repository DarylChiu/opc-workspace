<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 IELTS Tutor v2.0</title>
    <style>
        :root {
            --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a4a;
            --accent: #6c63ff; --accent2: #00d4aa; --text: #e0e0f0;
            --muted: #888; --user-bubble: #1e3a5f; --tutor-bubble: #2d1f4e;
            --danger: #ff6b6b; --warn: #ffa500; --gold: #ffd700;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 16px;
            display: flex; justify-content: center;
        }
        .app {
            width: 100%; max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: auto auto 1fr;
            gap: 12px;
        }
        .header {
            grid-column: 1/-1;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
        }
        .header h1 { font-size: 18px; }
        .controls {
            grid-column: 1;
            display: flex; gap: 8px; align-items: center;
            padding: 10px 16px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .controls label, .controls span { font-size: 12px; color: var(--muted); }
        .controls select {
            padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer;
        }
        .btn {
            padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 700;
            border: none; cursor: pointer; transition: all .2s;
        }
        .btn-start { background: var(--accent); color: #fff; }
        .btn-start:hover { background: #7b73ff; }
        .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-end { background: var(--danger); color: #fff; font-size: 12px; padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; }

        .mic-bar {
            display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px;
        }
        .mic-meter { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
        .mic-fill { height:100%; background:var(--accent2); border-radius:3px; transition:width .15s; width:0; }

        .status-bar {
            grid-column: 1;
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px; background: var(--card); border-radius: 12px;
            border: 1px solid var(--border); font-size: 13px;
        }
        .status-dot { width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0; }
        .status-dot.on { background:var(--accent2); animation:pulse 1.5s infinite; }
        .status-dot.thinking { background:#ffa500; animation:pulse 1s infinite; }
        .status-dot.speaking { background:var(--accent); animation:pulse .5s infinite; }
        @keyframes pulse { 50%{opacity:.4} }

        .main-area {
            grid-column: 1; display: flex; flex-direction: column; gap: 0;
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
            overflow: hidden; min-height: 60vh; max-height: 65vh;
        }
        .transcript {
            flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px;
            min-height:0;
        }
        .msg {
            max-width:85%; padding:8px 14px; border-radius:14px;
            font-size:14px; line-height:1.5; animation:fadeIn .3s;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} }
        .msg.user { align-self:flex-end; background:var(--user-bubble); }
        .msg.tutor { align-self:flex-start; background:var(--tutor-bubble); }
        .msg.system { align-self:center; color:var(--muted); font-size:12px; text-align:center; background:transparent; }
        .msg.error { align-self:center; background:#3a1a1a; color:var(--danger); border:1px solid var(--danger); }
        .msg .speaker { font-size:11px; color:var(--muted); margin-bottom:2px; display:block; }
        .msg .time { font-size:10px; color:var(--muted); margin-top:4px; text-align:right; }
        .empty-state { text-align:center; color:var(--muted); padding:60px 20px; font-size:15px; line-height:1.6; }

        /* Score panel */
        .score-panel {
            grid-column: 2; grid-row: 2/5;
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
            padding: 16px; display: flex; flex-direction: column; gap: 16px;
            max-height: 80vh; overflow-y: auto;
        }
        .score-panel h2 { font-size: 15px; text-align: center; color: var(--accent2); }
        .score-dim {
            display: flex; flex-direction: column; gap: 4px;
        }
        .score-dim .label { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
        .score-dim .bar-bg {
            height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
        }
        .score-dim .bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
        .bar-fill.f { background: var(--accent2); }
        .bar-fill.v { background: #4dc9f6; }
        .bar-fill.g { background: #f39c12; }
        .bar-fill.p { background: #e74c8b; }
        .overall-score {
            text-align: center; padding: 12px; background: var(--bg); border-radius: 12px;
        }
        .overall-score .number { font-size: 36px; font-weight: 800; color: var(--gold); }
        .overall-score .label { font-size: 11px; color: var(--muted); }
        .score-empty { text-align:center; color:var(--muted); font-size:12px; padding:20px 0; }
        .score-turn { font-size: 11px; color: var(--muted); padding: 4px 8px; border-radius: 6px; background: var(--bg); }
        .score-note { font-size: 12px; color: var(--text); line-height: 1.6; padding: 8px; background: var(--bg); border-radius: 8px; border-left: 3px solid var(--accent); }

        audio { display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🎤 IELTS Tutor v2.0</h1>
        <span style="padding:4px 10px;border-radius:20px;font-size:12px;background:var(--accent);color:#fff;font-weight:600">管线1</span>
    </div>

    <!-- Controls -->
    <div class="controls">
        <label>模式</label>
        <select id="modeSelect">
            <option value="ielts_part1">IELTS Part 1</option>
            <option value="ielts_part2">IELTS Part 2</option>
            <option value="ielts_part3">IELTS Part 3</option>
            <option value="business_pitch">商业英语 Pitch</option>
            <option value="free_talk">自由对话</option>
        </select>
        <button class="btn btn-start" id="startBtn" onclick="startSession()" disabled>🎙️ 开始对话</button>
        <button class="btn-end" id="endBtn" onclick="endSession()" style="display:none">⏹ 结束</button>
        <div class="mic-bar">
            <span style="font-size:12px">🎤</span>
            <div class="mic-meter"><div class="mic-fill" id="micFill"></div></div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">正在检测麦克风...</span>
    </div>

    <!-- Transcript -->
    <div class="main-area">
        <div class="transcript" id="transcript">
            <div class="empty-state">👋 选择模式 → 点击「开始对话」</div>
        </div>
    </div>

    <!-- Score panel -->
    <div class="score-panel" id="scorePanel">
        <h2>📊 实时评分</h2>
        <div class="score-empty" id="scoreEmpty">开始对话后显示评分</div>
        <div id="scoreContent" style="display:none">
            <div class="overall-score">
                <div class="number" id="overallScore">-</div>
                <div class="label">综合评分 / 9.0</div>
            </div>
            <div class="score-dim"><div class="label"><span>流利度 Fluency</span><span id="scoreF">-</span></div><div class="bar-bg"><div class="bar-fill f" id="barF"></div></div></div>
            <div class="score-dim"><div class="label"><span>词汇 Vocabulary</span><span id="scoreV">-</span></div><div class="bar-bg"><div class="bar-fill v" id="barV"></div></div></div>
            <div class="score-dim"><div class="label"><span>语法 Grammar</span><span id="scoreG">-</span></div><div class="bar-bg"><div class="bar-fill g" id="barG"></div></div></div>
            <div class="score-dim"><div class="label"><span>发音 Pronunciation</span><span id="scoreP">-</span></div><div class="bar-bg"><div class="bar-fill p" id="barP"></div></div></div>
            <div class="score-note" id="scoreNote"></div>
            <div class="score-turn" id="scoreTurn"></div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
</div>

<script>
// ─── State ───
let ws = null, sessionId = null, isActive = false;
let audioContext = null, micStream = null, micAnalyser = null;
let audioQueue = [], isPlaying = false;
let scores = {f:0,v:0,g:0,p:0, overall:'-'};

async function api(method, path, body) {
    const r = await fetch(`http://${location.hostname}:8767${path}`, {
        method, headers: body?{'Content-Type':'application/json'}:{},
        body: body?JSON.stringify(body):undefined
    });
    return r.json();
}

// ─── Mic ───
async function checkMic() {
    try {
        micStream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
        });
        const ctx = new AudioContext({sampleRate: 16000});
        const src = ctx.createMediaStreamSource(micStream);
        micAnalyser = ctx.createAnalyser(); micAnalyser.fftSize = 256;
        src.connect(micAnalyser);
        const data = new Uint8Array(micAnalyser.frequencyBinCount);
        setInterval(() => {
            micAnalyser.getByteFrequencyData(data);
            const v = Math.min(100, data.reduce((a,b)=>a+b,0)/data.length*2);
            document.getElementById('micFill').style.width = v+'%';
        }, 100);
        document.getElementById('startBtn').disabled = false;
        setStatus('ready', '✅ 麦克风就绪');
        return true;
    } catch(e) {
        document.getElementById('startBtn').disabled = true;
        setStatus('error', '❌ 麦克风不可用，请检查权限');
        return false;
    }
}

// ─── Session ───
async function startSession() {
    const mode = document.getElementById('modeSelect').value;
    const data = await api('POST', '/api/session/start', {mode, pipeline:'cascade'});
    sessionId = data.session_id;

    ws = new WebSocket(`ws://${location.hostname}:8767/ws/chat/${sessionId}`);
    ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        switch(m.type) {
            case 'response_text':
                addMsg('tutor', m.text);
                // After tutor message, trigger evaluation
                if (m.text && !m.text.startsWith('Good morning') && !m.text.startsWith('Now I\'m') && !m.text.startsWith('Now let\'s') && !m.text.startsWith('Welcome') && !m.text.startsWith('Hi there')) {
                    requestScore();
                }
                break;
            case 'final_transcript':
                addMsg('user', m.text);
                break;
            case 'audio':
                playAudio(m.data);
                break;
            case 'status':
                if (m.state === 'listening') {
                    setStatus('on', '正在听...');
                    resumeMic();
                } else if (m.state === 'thinking') {
                    setStatus('thinking', '思考中...');
                } else if (m.state === 'speaking') {
                    setStatus('speaking', '正在说...');
                    pauseMic();
                }
                break;
            case 'score':
                updateScores(m);
                break;
            case 'error':
                addMsg('system', '错误: '+m.msg, 'error');
                break;
        }
    };
    ws.onclose = () => { setStatus('ready', '对话已结束'); endSession(); };
    ws.onerror = () => { setStatus('error', '连接失败'); addMsg('system', '连接失败，请刷新重试', 'error'); };

    await new Promise(r => { ws.onopen = r; });

    // Start continuous mic
    startMicStream();
    isActive = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('endBtn').style.display = 'inline-block';
    document.getElementById('modeSelect').disabled = true;
    document.getElementById('scoreEmpty').style.display = 'none';
    document.getElementById('scoreContent').style.display = 'block';
    setStatus('on', '已连接 · 开始说话');
}

function endSession() {
    isActive = false;
    if (audioContext) { audioContext.close().catch(()=>{}); audioContext = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type:'stop'}));
        ws.close();
    }
    ws = null;
    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('endBtn').style.display = 'none';
    document.getElementById('modeSelect').disabled = false;
    setStatus('ready', '对话已结束');
}

// ─── Continuous mic ───
function startMicStream() {
    audioContext = new AudioContext({sampleRate: 16000});
    const source = audioContext.createMediaStreamSource(micStream);
    const processor = audioContext.createScriptProcessor(4096, 1, 1);
    source.connect(processor);
    processor.connect(audioContext.destination);

    processor.onaudioprocess = (e) => {
        if (!isActive || !ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const pcm = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++)
            pcm[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
        ws.send(JSON.stringify({type:'audio', data: btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)))}));
    };
}

function pauseMic() {
    // Stop sending audio while AI is speaking (processor handles this via isActive check)
    // The server continues receiving silence and won't auto-flush
}

function resumeMic() {
    // Audio sending resumes automatically via isActive=true
    // Server's silence watcher resets on new audio
}

// ─── Scores ───
async function requestScore() {
    // Called after each tutor response - request evaluation
    if (!sessionId || !ws) return;
    ws.send(JSON.stringify({type:'evaluate'}));
}

function updateScores(m) {
    const s = m.scores || {};
    if (s.f) { scores.f = s.f; document.getElementById('scoreF').textContent = s.f.toFixed(1); document.getElementById('barF').style.width = (s.f/9*100)+'%'; }
    if (s.v) { scores.v = s.v; document.getElementById('scoreV').textContent = s.v.toFixed(1); document.getElementById('barV').style.width = (s.v/9*100)+'%'; }
    if (s.g) { scores.g = s.g; document.getElementById('scoreG').textContent = s.g.toFixed(1); document.getElementById('barG').style.width = (s.g/9*100)+'%'; }
    if (s.p) { scores.p = s.p; document.getElementById('scoreP').textContent = s.p.toFixed(1); document.getElementById('barP').style.width = (s.p/9*100)+'%'; }
    
    const avg = (scores.f + scores.v + scores.g + scores.p) / 4;
    document.getElementById('overallScore').textContent = avg > 0 ? avg.toFixed(1) : '-';
    document.getElementById('scoreNote').textContent = m.note || '';
    document.getElementById('scoreTurn').textContent = '📍 本轮评分';
}

// ─── UI ───
function setStatus(cls, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot';
    if (cls === 'on' || cls === 'active') dot.classList.add('on');
    else if (cls !== 'ready' && cls !== 'error') dot.classList.add(cls);
    document.getElementById('statusText').textContent = text;
}

function addMsg(role, text, cls) {
    const t = document.getElementById('transcript');
    const empty = t.querySelector('.empty-state');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg '+(cls||role);
    const now = new Date();
    const speaker = role==='user' ? '🧑 你' : role==='tutor' ? '🎓 考官' : '';
    const safeText = text.replace(/</g,'&lt;');
    div.innerHTML = `<span class="speaker">${speaker}</span>${safeText}<div class="time">${now.toLocaleTimeString()}</div>`;
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
}

// ─── Audio ───
function playAudio(b64) { audioQueue.push(b64); if(!isPlaying) playNext(); }
function playNext() {
    if(!audioQueue.length) { isPlaying=false; return; }
    isPlaying=true;
    const bytes = Uint8Array.from(atob(audioQueue.shift()), c=>c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes],{type:'audio/mp3'}));
    const p = document.getElementById('audioPlayer');
    p.src=url; p.onended=()=>{URL.revokeObjectURL(url);playNext()};
    p.play().catch(()=>playNext());
}

// ─── Init ───
checkMic();
</script>
</body>
</html>

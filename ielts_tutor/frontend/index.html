<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 IELTS Tutor v2.0</title>
<style>
:root {
    --bg:#0f0f1a; --card:#1a1a2e; --border:#2a2a4a;
    --accent:#6c63ff; --accent2:#00d4aa; --text:#e0e0f0;
    --muted:#888; --user-bubble:#1e3a5f; --tutor-bubble:#2d1f4e;
    --danger:#ff6b6b; --gold:#ffd700; --rec:#ff3333;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:var(--bg); color:var(--text); height:100vh; overflow:hidden;
    padding:10px 16px; display:flex; justify-content:center;
}
.app { width:100%; max-width:1100px; display:flex; flex-direction:column; gap:8px; height:100%; }
.header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; background:var(--card); border-radius:10px; border:1px solid var(--border); flex-shrink:0;
}
.header h1 { font-size:16px; }
.status-row {
    display:flex; align-items:center; gap:8px; flex-shrink:0;
    padding:4px 14px; background:var(--card); border-radius:8px; border:1px solid var(--border);
    font-size:11px; height:28px;
}
.status-dot { width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0; }
.status-dot.rec { background:var(--rec); animation:pulse .8s infinite; }
.status-dot.on { background:var(--accent2); animation:pulse 1.5s infinite; }
.status-dot.thinking { background:#ffa500; animation:pulse 1s infinite; }
.status-dot.speaking { background:var(--accent); animation:pulse .5s infinite; }
@keyframes pulse { 50%{opacity:.3} }
.mic-lvl { display:flex;align-items:center;gap:3px; width:50px;flex-shrink:0; }
.mic-lvl .bar { flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden; }
.mic-lvl .fill { height:100%;background:var(--accent2);border-radius:2px;transition:width .1s;width:0; }
.dev-info { color:var(--muted);flex-shrink:0;font-size:10px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.dev-info select { background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;font-size:10px;padding:1px 3px;margin-left:3px;max-width:130px; }

.ctrls {
    display:flex; align-items:center; gap:8px; flex-shrink:0;
    padding:6px 12px; background:var(--card); border-radius:8px; border:1px solid var(--border);
}
.ctrls label { font-size:11px; color:var(--muted); }
.ctrls select {
    padding:5px 8px; border-radius:6px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); font-size:12px; cursor:pointer;
}
.btn {
    padding:6px 14px; border-radius:7px; font-size:12px; font-weight:700;
    border:none; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.btn-rec { background:var(--accent); color:#fff; min-width:80px; }
.btn-rec:hover { background:#7b73ff; }
.btn-rec:disabled { opacity:.4; cursor:not-allowed; }
.btn-rec.active { background:var(--rec); animation:recPulse 2s infinite; }
@keyframes recPulse { 50%{background:#cc0000} }
.btn-end { background:var(--danger); color:#fff; }
.btn-end:hover { background:#ff4b4b; }

.main { display:flex; gap:10px; flex:1; min-height:0; }
.dialogue-col {
    flex:1; display:flex; flex-direction:column; min-width:0;
    background:var(--card); border-radius:10px; border:1px solid var(--border);
}
.transcript {
    flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:5px; min-height:0;
}
.transcript::-webkit-scrollbar { width:5px; }
.transcript::-webkit-scrollbar-track { background:transparent; }
.transcript::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.score-panel {
    width:310px; flex-shrink:0;
    background:var(--card); border-radius:10px; border:1px solid var(--border);
    padding:12px; display:flex; flex-direction:column; gap:8px; overflow-y:auto;
}
.score-panel::-webkit-scrollbar { width:5px; }
.score-panel::-webkit-scrollbar-track { background:transparent; }
.score-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.score-panel h2 { font-size:13px; text-align:center; color:var(--accent2); }

.msg { max-width:85%; padding:7px 11px; border-radius:10px; font-size:13px; line-height:1.5; animation:fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} }
.msg.user { align-self:flex-end; background:var(--user-bubble); }
.msg.tutor { align-self:flex-start; background:var(--tutor-bubble); }
.msg.system { align-self:center; color:var(--muted); font-size:11px; padding:4px 8px; background:var(--bg); border-radius:6px; }
.msg .speaker { font-size:10px; color:var(--muted); display:block; }
.msg .time { font-size:9px; color:var(--muted); margin-top:2px; text-align:right; }
.empty-state { text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; line-height:1.6; }

.overall { text-align:center; padding:8px; background:var(--bg); border-radius:8px; }
.overall .num { font-size:28px; font-weight:800; color:var(--gold); }
.overall .lbl { font-size:10px; color:var(--muted); }
.sdim { display:flex; flex-direction:column; gap:2px; }
.sdim .lbl { font-size:10px; color:var(--muted); display:flex; justify-content:space-between; }
.sdim .bar-bg { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.sdim .bar-fill { height:100%; border-radius:2px; transition:width .5s; }
.bar-f.f { background:var(--accent2); } .bar-f.v { background:#4dc9f6; }
.bar-f.g { background:#f39c12; } .bar-f.p { background:#e74c8b; }
.score-sect h3 { font-size:11px; color:var(--accent2); margin:4px 0; }
.score-item { font-size:10px; padding:3px 6px; margin-bottom:3px; background:var(--bg); border-radius:4px; line-height:1.4; }
.score-item.improve { border-left:3px solid var(--danger); }
.score-item.good { border-left:3px solid var(--accent2); }
.score-summary { font-size:10px; color:var(--text); padding:5px; background:var(--bg); border-radius:6px; line-height:1.5; }
.score-empty { text-align:center; color:var(--muted); font-size:11px; padding:20px 0; }
audio { display:none; }
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🎤 IELTS Tutor v2.0</h1>
        <span style="padding:2px 10px;border-radius:20px;font-size:11px;background:var(--accent);color:#fff;font-weight:600">管线1</span>
    </div>

    <div class="status-row">
        <div class="mic-lvl"><div class="bar"><div class="fill" id="micFill"></div></div></div>
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">检测麦克风...</span>
        <div class="dev-info" id="deviceInfo"></div>
    </div>

    <div class="ctrls">
        <label>模式</label>
        <select id="modeSelect">
            <option value="ielts_part1">IELTS Part 1</option>
            <option value="ielts_part2">IELTS Part 2</option>
            <option value="ielts_part3">IELTS Part 3</option>
            <option value="business_pitch">商业英语</option>
            <option value="free_talk">自由对话</option>
        </select>
        <button class="btn btn-rec" id="recBtn" onclick="doRec()" disabled>🎙️ 录音</button>
        <button class="btn btn-end" id="endBtn" onclick="endSession()" style="display:none">⛔ 终止</button>
    </div>

    <div class="main">
        <div class="dialogue-col">
            <div class="transcript" id="transcript">
                <div class="empty-state">👋 选择模式，点击「录音」开始</div>
            </div>
        </div>
        <div class="score-panel" id="scorePanel">
            <h2>📊 Assessment</h2>
            <div class="score-empty" id="scoreEmpty">Scores appear after conversation ends</div>
            <div id="scoreContent" style="display:none">
                <div class="overall"><div class="num" id="overallScore">-</div><div class="lbl">Overall Band Score</div></div>
                <div class="sdim"><div class="lbl"><span>Fluency</span><span id="scoreF">-</span></div><div class="bar-bg"><div class="bar-fill bar-f f" id="barF"></div></div></div>
                <div class="sdim"><div class="lbl"><span>Vocabulary</span><span id="scoreV">-</span></div><div class="bar-bg"><div class="bar-fill bar-f v" id="barV"></div></div></div>
                <div class="sdim"><div class="lbl"><span>Grammar</span><span id="scoreG">-</span></div><div class="bar-bg"><div class="bar-fill bar-f g" id="barG"></div></div></div>
                <div class="sdim"><div class="lbl"><span>Pronunciation</span><span id="scoreP">-</span></div><div class="bar-bg"><div class="bar-fill bar-f p" id="barP"></div></div></div>
                <div class="score-summary" id="scoreSummary"></div>
                <div class="score-sect" id="improveSection" style="display:none"><h3>🔧 To Improve</h3><div id="improveList"></div></div>
                <div class="score-sect" id="highlightSection" style="display:none"><h3>⭐ Strong Points</h3><div id="highlightList"></div></div>
            </div>
        </div>
    </div>
    <audio id="audioPlayer"></audio>
</div>

<script>
let ws=null, sid=null, sessionActive=false;
let recCtx=null, recStream=null, recProc=null;
let audioQ=[], playing=false;
let userTexts=[], recBuf=[], availableDevices=[], curDev=null;

const SRV=`http://${location.hostname}:8767`;

async function api(m,p,b){
    const r=await fetch(`${SRV}${p}`,{method:m,headers:b?{'Content-Type':'application/json'}:{},body:b?JSON.stringify(b):undefined});
    return r.json();
}

// ─── Device ───
async function detectDevices(){
    try{
        const devs=await navigator.mediaDevices.enumerateDevices();
        availableDevices=devs.filter(d=>d.kind==='audioinput'&&d.deviceId&&d.label);
        if(availableDevices.length>1){
            const sel=document.createElement('select');
            sel.onchange=switchDevice;
            availableDevices.forEach((d,i)=>{
                const o=document.createElement('option');
                o.value=d.deviceId;o.textContent=d.label||`Mic ${i+1}`;
                sel.appendChild(o);
            });
            document.getElementById('deviceInfo').appendChild(sel);
            curDev=availableDevices[0];
        }else if(availableDevices.length===1){
            document.getElementById('deviceInfo').textContent=`🎤 ${availableDevices[0].label||'Microphone'}`;
            curDev=availableDevices[0];
        }
        await previewMic();
    }catch(e){ setStatus('error','麦克风权限未授权'); }
}

async function switchDevice(){
    const sel=document.querySelector('#deviceInfo select');
    if(!sel) return;
    curDev=availableDevices.find(d=>d.deviceId===sel.value);
    if(recStream){ recStream.getTracks().forEach(t=>t.stop()); }
    await previewMic();
}

async function previewMic(){
    try{
        const cid=curDev?{deviceId:{exact:curDev.deviceId}}:undefined;
        recStream=await navigator.mediaDevices.getUserMedia({
            audio:{...cid, sampleRate:16000, channelCount:1, echoCancellation:true}
        });
        if(!sessionActive){
            const tmp=new AudioContext({sampleRate:16000});
            const src=tmp.createMediaStreamSource(recStream);
            const a=tmp.createAnalyser(); a.fftSize=256; src.connect(a);
            const data=new Uint8Array(a.frequencyBinCount);
            const ivl=setInterval(()=>{
                if(sessionActive){clearInterval(ivl);tmp.close();return;}
                a.getByteFrequencyData(data);
                document.getElementById('micFill').style.width=Math.min(100,data.reduce((x,y)=>x+y,0)/data.length*2)+'%';
            },100);
        }
        document.getElementById('recBtn').disabled=false;
        setStatus('ready','麦克风就绪');
    }catch(e){ document.getElementById('recBtn').disabled=true; setStatus('error','麦克风不可用'); }
}

// ─── Session ───
async function initSession(){
    if(ws&&ws.readyState===WebSocket.OPEN) return;
    const mode=document.getElementById('modeSelect').value;
    const d=await api('POST','/api/session/start',{mode,pipeline:'cascade'});
    sid=d.session_id;

    ws=new WebSocket(`ws://${location.hostname}:8767/ws/chat/${sid}`);
    ws.onmessage=e=>{
        const m=JSON.parse(e.data);
        if(m.type==='response_text'){ addMsg('tutor',m.text); }
        if(m.type==='final_transcript'){ addMsg('user',m.text); userTexts.push(m.text); }
        if(m.type==='audio'){ playAudio(m.data); }
        if(m.type==='status'){
            if(m.state==='thinking') setStatus('thinking','Thinking...');
            else if(m.state==='speaking') setStatus('speaking','Speaking...');
            else if(m.state==='done'){ setStatus('ready','麦克风就绪'); enableRec(); }
        }
        if(m.type==='score') showScores(m);
    };
    ws.onerror=()=>{ addMsg('system','Connection error','system'); };
    await new Promise(r=>{ws.onopen=r;});
    sessionActive=true;
    document.getElementById('modeSelect').disabled=true;
    document.getElementById('endBtn').style.display='inline-block';
}

// ─── PTT Record ───
function disableRec(){ document.getElementById('recBtn').disabled=true; }
function enableRec(){ document.getElementById('recBtn').disabled=false; }

async function doRec(){
    if(!sessionActive) await initSession();
    const btn=document.getElementById('recBtn');

    if(btn.classList.contains('active')){
        // STOP recording → flush → process
        btn.classList.remove('active');
        btn.textContent='🎙️ 录音';
        setStatus('thinking','Processing...');
        disableRec();

        // Disconnect processor
        if(recProc){ recProc.disconnect(); recProc=null; }
        if(recCtx){ recCtx.close().catch(()=>{}); recCtx=null; }

        // Flush recorded audio to server
        if(recBuf.length && ws&&ws.readyState===WebSocket.OPEN){
            for(const chunk of recBuf) ws.send(JSON.stringify({type:'audio',data:chunk}));
            ws.send(JSON.stringify({type:'flush'}));
        }
        recBuf=[];

    } else {
        // START recording
        btn.classList.add('active');
        btn.textContent='⏹ 停止录音';
        setStatus('rec','🔴 录音中...');
        recBuf=[];

        recCtx=new AudioContext({sampleRate:16000});
        const src=recCtx.createMediaStreamSource(recStream);
        recProc=recCtx.createScriptProcessor(4096,1,1);
        src.connect(recProc); recProc.connect(recCtx.destination);
        recProc.onaudioprocess=e=>{
            const input=e.inputBuffer.getChannelData(0);
            const pcm=new Int16Array(input.length);
            for(let i=0;i<input.length;i++) pcm[i]=Math.max(-32768,Math.min(32767,input[i]*32768));
            recBuf.push(btoa(String.fromCharCode(...new Uint8Array(pcm.buffer))));
        };
    }
}

async function endSession(){
    if(recProc){ recProc.disconnect(); recProc=null; }
    if(recCtx){ recCtx.close().catch(()=>{}); recCtx=null; }
    sessionActive=false;
    document.getElementById('recBtn').classList.remove('active');
    document.getElementById('recBtn').textContent='🎙️ 录音';
    disableRec();

    if(ws&&ws.readyState===WebSocket.OPEN){
        ws.send(JSON.stringify({type:'evaluate_final'}));
        await new Promise(r=>setTimeout(r,4000));
        ws.send(JSON.stringify({type:'stop'}));
        ws.close();
    }
    ws=null;
    await previewMic();
    document.getElementById('endBtn').style.display='none';
    document.getElementById('modeSelect').disabled=false;
    setStatus('ready','麦克风就绪');
}

// ─── UI ───
function setStatus(c,txt){
    const d=document.getElementById('statusDot');
    d.className='status-dot';
    if(c!=='error'&&c!=='ready') d.classList.add(c);
    else if(c==='ready') d.classList.add('on');
    document.getElementById('statusText').textContent=txt;
}

function addMsg(role,text,cls){
    const t=document.getElementById('transcript');
    const em=t.querySelector('.empty-state'); if(em) em.remove();
    const d=document.createElement('div');
    d.className='msg '+(cls||role);
    const speaker=role==='user'?'🧑 You':role==='tutor'?'🎓 Examiner':'';
    d.innerHTML=`<span class="speaker">${speaker}</span>${text.replace(/</g,'&lt;')}<div class="time">${new Date().toLocaleTimeString()}</div>`;
    t.appendChild(d); t.scrollTop=t.scrollHeight;
}

function showScores(m){
    document.getElementById('scoreEmpty').style.display='none';
    document.getElementById('scoreContent').style.display='block';
    const s=m.scores||{};
    const set=(id,bar,v)=>{document.getElementById(id).textContent=v.toFixed(1);document.getElementById(bar).style.width=(v/9*100)+'%';};
    if(s.fluency) set('scoreF','barF',s.fluency);
    if(s.vocabulary) set('scoreV','barV',s.vocabulary);
    if(s.grammar) set('scoreG','barG',s.grammar);
    if(s.pronunciation) set('scoreP','barP',s.pronunciation);
    if(s.overall) document.getElementById('overallScore').textContent=s.overall.toFixed(1);
    if(s.summary) document.getElementById('scoreSummary').textContent=s.summary;
    if(s.improvements&&s.improvements.length){
        document.getElementById('improveSection').style.display='block';
        document.getElementById('improveList').innerHTML=s.improvements.map(t=>`<div class="score-item improve">${t}</div>`).join('');
    }
    if(s.highlights&&s.highlights.length){
        document.getElementById('highlightSection').style.display='block';
        document.getElementById('highlightList').innerHTML=s.highlights.map(t=>`<div class="score-item good">${t}</div>`).join('');
    }
}

function playAudio(b64){ audioQ.push(b64); if(!playing) next(); }
function next(){
    if(!audioQ.length){ playing=false; return; }
    playing=true;
    const b=a=>Uint8Array.from(atob(a),c=>c.charCodeAt(0));
    const url=URL.createObjectURL(new Blob([b(audioQ.shift())],{type:'audio/mp3'}));
    const p=document.getElementById('audioPlayer'); p.src=url;
    p.onended=()=>{URL.revokeObjectURL(url);next()};
    p.play().catch(()=>next());
}

detectDevices();
</script>
</body>
</html>

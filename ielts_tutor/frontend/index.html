<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 IELTS Tutor v2.0</title>
    <style>
        :root {
            --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a4a;
            --accent: #6c63ff; --accent2: #00d4aa; --text: #e0e0f0;
            --muted: #888; --user-bubble: #1e3a5f; --tutor-bubble: #2d1f4e;
            --danger: #ff6b6b; --warn: #ffa500;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; justify-content: center;
            padding: 16px;
        }
        .app { max-width: 600px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .pipeline-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 12px;
            background: var(--accent); color: #fff; font-weight: 600;
        }
        .controls {
            display: flex; gap: 8px; flex-wrap: wrap;
            padding: 12px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
        }
        .controls label { font-size: 11px; color: var(--muted); margin-bottom: 2px; display: block; }
        .controls select, .controls button {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer;
        }
        .btn-record {
            flex: 1; min-width: 100px; padding: 12px; font-size: 16px; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer; transition: all .2s;
        }
        .btn-start { background: var(--accent); color: #fff; }
        .btn-start:hover { background: #7b73ff; }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn-stop:hover { background: #ff4b4b; }
        .btn-abort {
            background: var(--warn); color: #000; font-size: 13px;
            padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; display: none;
        }
        .btn-abort.visible { display: inline-block; }
        .btn-record:disabled, .btn-abort:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border); font-size: 13px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0;
        }
        .status-dot.active { background: #00d4aa; animation: pulse 1.5s infinite; }
        .status-dot.thinking { background: #ffa500; animation: pulse 1s infinite; }
        .status-dot.speaking { background: var(--accent); animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }
        .transcript {
            flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:8px;
            padding:12px; background:var(--card); border-radius:12px; border:1px solid var(--border);
            max-height:50vh;
        }
        .msg {
            max-width:85%; padding:8px 14px; border-radius:14px;
            font-size:14px; line-height:1.5; animation:fadeIn .3s;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} }
        .msg.user { align-self:flex-end; background:var(--user-bubble); }
        .msg.tutor { align-self:flex-start; background:var(--tutor-bubble); }
        .msg.system { align-self:center; background:transparent; color:var(--muted); font-size:12px; text-align:center; }
        .msg.error { align-self:center; background:#3a1a1a; color:var(--danger); border:1px solid var(--danger); }
        .msg .speaker { font-size:11px; color:var(--muted); margin-bottom:2px; display:block; }
        .msg .time { font-size:10px; color:var(--muted); margin-top:4px; }
        .mic-test {
            padding: 12px; background: var(--card); border-radius: 12px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
        }
        .mic-meter {
            flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
        }
        .mic-meter .fill {
            height: 100%; background: var(--accent2); border-radius: 4px; transition: width .1s;
            width: 0%;
        }
        .mic-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
        audio { display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🎤 IELTS Tutor v2.0</h1>
        <span class="pipeline-badge" id="pipelineBadge">管线1</span>
    </div>

    <!-- Mic test -->
    <div class="mic-test" id="micTest" style="display:none">
        <span class="mic-label">🎤 麦克风</span>
        <div class="mic-meter"><div class="fill" id="micFill"></div></div>
        <span class="mic-label" id="micStatus">检测中...</span>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div>
            <label>模式</label>
            <select id="modeSelect" onchange="onModeChange()">
                <option value="ielts_part1">IELTS Part 1</option>
                <option value="ielts_part2">IELTS Part 2</option>
                <option value="ielts_part3">IELTS Part 3</option>
                <option value="business_pitch">商业英语 Pitch</option>
                <option value="free_talk">自由对话</option>
            </select>
        </div>
        <button class="btn-record btn-start" id="recordBtn" onclick="toggleRecording()">
            🎙️ 开始练习
        </button>
        <button class="btn-abort" id="abortBtn" onclick="forceStop()">
            ⛔ 终止
        </button>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">就绪 · 选择模式后点击开始</span>
    </div>

    <div class="transcript" id="transcript">
        <div class="empty-state" style="text-align:center;color:var(--muted);padding:60px 20px;font-size:15px;line-height:1.6">
            👋 选择练习模式<br>
            <span style="font-size:13px">点击「开始练习」启动语音对话</span>
        </div>
    </div>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
// ─── State ───
let ws = null, sessionId = null, isRecording = false;
let audioContext = null, micStream = null;
let audioQueue = [], isPlaying = false;
let statusTimeout = null;

async function api(method, path, body) {
    const r = await fetch(`http://${location.hostname}:8767${path}`, {
        method, headers: body ? {'Content-Type':'application/json'} : {},
        body: body ? JSON.stringify(body) : undefined
    });
    return r.json();
}

// ─── Mic test ───
async function testMicrophone() {
    const el = document.getElementById('micTest');
    const fill = document.getElementById('micFill');
    const status = document.getElementById('micStatus');
    el.style.display = 'flex';

    try {
        status.textContent = '请求权限...';
        micStream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
        });
        status.textContent = '✅ 就绪';
        status.style.color = 'var(--accent2)';

        // Show live level
        const ctx = new AudioContext({sampleRate: 16000});
        const src = ctx.createMediaStreamSource(micStream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        const ivl = setInterval(() => {
            if (!isRecording) {
                analyser.getByteFrequencyData(data);
                const avg = data.reduce((a,b)=>a+b,0)/data.length;
                fill.style.width = Math.min(100, avg*2)+'%';
            }
        }, 100);

        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordBtn').title = '';
        status.style.color = '';

        return { ctx, analyser, ivl };
    } catch (e) {
        status.textContent = '❌ 麦克风未授权或不可用';
        status.style.color = 'var(--danger)';
        document.getElementById('recordBtn').disabled = true;
        document.getElementById('recordBtn').title = '请先允许麦克风权限';
        addSystemMsg('error', '⚠️ 麦克风不可用，请检查浏览器权限设置后刷新页面');
        return null;
    }
}

// ─── WebSocket ───
async function connectSession() {
    const mode = document.getElementById('modeSelect').value;
    const data = await api('POST', '/api/session/start', {mode, pipeline:'cascade'});
    sessionId = data.session_id;

    ws = new WebSocket(`ws://${location.hostname}:8767/ws/chat/${sessionId}`);
    ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        switch(m.type) {
            case 'response_text':
                addMessage('tutor', m.text);
                break;
            case 'final_transcript':
                addMessage('user', m.text);
                break;
            case 'audio':
                playAudio(m.data);
                break;
            case 'status':
                setStatus(m.state);
                break;
            case 'error':
                addSystemMsg('error', '错误: '+m.msg);
                forceStop();
                break;
        }
    };
    ws.onclose = () => { setStatus('disconnected'); addSystemMsg('system', '会话已结束'); };
    ws.onerror = () => { setStatus('disconnected'); addSystemMsg('error', '连接失败，请刷新重试'); };
    await new Promise(r => { ws.onopen = r; });
    setStatus('active');
}

// ─── Recording ───
async function toggleRecording() {
    if (isRecording) {
        stopMic(); return;
    }

    // First time: test mic
    if (!micStream) {
        const ok = await testMicrophone();
        if (!ok) return;
    }

    // Connect if needed
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        try {
            await connectSession();
        } catch(e) {
            addSystemMsg('error', '连接服务器失败，请确认服务已启动');
            return;
        }
    }

    // Start recording
    audioContext = new AudioContext({sampleRate: 16000});
    const source = audioContext.createMediaStreamSource(micStream);
    const processor = audioContext.createScriptProcessor(4096, 1, 1);
    source.connect(processor);
    processor.connect(audioContext.destination);

    processor.onaudioprocess = (e) => {
        if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const pcm = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++)
            pcm[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
        ws.send(JSON.stringify({type:'audio', data: btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)))}));
    };

    isRecording = true;
    document.getElementById('recordBtn').textContent = '⏹️ 停止';
    document.getElementById('recordBtn').className = 'btn-record btn-stop';
    document.getElementById('abortBtn').classList.add('visible');
    setStatus('active', '正在听...');

    // Safety timeout: auto-stop after 60s if stuck
    clearTimeout(statusTimeout);
    statusTimeout = setTimeout(() => {
        if (isRecording) {
            addSystemMsg('system', '⏰ 60秒自动停止');
            stopMic();
        }
    }, 60000);
}

function stopMic() {
    isRecording = false;
    clearTimeout(statusTimeout);
    if (audioContext) {
        audioContext.close().catch(()=>{});
        audioContext = null;
    }

    document.getElementById('recordBtn').textContent = '🎙️ 开始练习';
    document.getElementById('recordBtn').className = 'btn-record btn-start';
    document.getElementById('abortBtn').classList.remove('visible');

    // Ask server to flush remaining audio
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type:'flush'}));
    }
}

function forceStop() {
    addSystemMsg('system', '⛔ 已终止');
    stopMic();
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type:'stop'}));
    }
    setStatus('disconnected', '已终止');
}

function onModeChange() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        const mode = document.getElementById('modeSelect').value;
        ws.send(JSON.stringify({type:'mode', mode}));
    }
}

// ─── UI ───
function setStatus(cls, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot';
    if (cls !== 'disconnected') dot.classList.add(cls);
    if (text) document.getElementById('statusText').textContent = text;
}

function addMessage(role, text) {
    const t = document.getElementById('transcript');
    const empty = t.querySelector('.empty-state');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const now = new Date();
    div.innerHTML = `<span class="speaker">${role==='user'?'🧑 你':'🎓 考官'}</span>${esc(text)}<div class="time">${now.toLocaleTimeString()}</div>`;
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
}

function addSystemMsg(type, text) {
    const t = document.getElementById('transcript');
    const empty = t.querySelector('.empty-state');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = `msg ${type === 'error' ? 'error' : 'system'}`;
    div.textContent = text;
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
}

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Audio ───
function playAudio(b64) {
    audioQueue.push(b64);
    if (!isPlaying) playNext();
}
function playNext() {
    if (!audioQueue.length) { isPlaying=false; return; }
    isPlaying=true;
    const b64 = audioQueue.shift();
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], {type:'audio/mp3'}));
    const p = document.getElementById('audioPlayer');
    p.src = url;
    p.onended = () => { URL.revokeObjectURL(url); playNext(); };
    p.play().catch(() => playNext());
}

// ─── Init ───
document.getElementById('recordBtn').disabled = true;
document.getElementById('recordBtn').title = '正在检测麦克风...';
testMicrophone();
</script>
</body>
</html>

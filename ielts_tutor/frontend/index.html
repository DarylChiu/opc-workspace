<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 IELTS Tutor v2.0</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --border: #2a2a4a;
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --text: #e0e0f0;
            --muted: #888;
            --user-bubble: #1e3a5f;
            --tutor-bubble: #2d1f4e;
            --danger: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; justify-content: center;
            padding: 16px;
        }
        .app {
            max-width: 600px; width: 100%;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .pipeline-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 12px;
            background: var(--accent); color: #fff; font-weight: 600;
        }
        .pipeline-badge.p2 { background: var(--accent2); color: #000; }

        /* Controls */
        .controls {
            display: flex; gap: 8px; flex-wrap: wrap;
            padding: 12px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
        }
        .controls label { font-size: 11px; color: var(--muted); margin-bottom: 2px; display: block; }
        .controls select, .controls button {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 13px;
            cursor: pointer;
        }
        .btn-record {
            flex: 1; min-width: 100px; padding: 12px; font-size: 16px; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer; transition: all .2s;
        }
        .btn-start { background: var(--accent); color: #fff; }
        .btn-start:hover { background: #7b73ff; }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn-stop:hover { background: #ff4b4b; }

        /* Status bar */
        .status-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
            font-size: 13px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted); flex-shrink: 0;
        }
        .status-dot.active { background: #00d4aa; animation: pulse 1.5s infinite; }
        .status-dot.thinking { background: #ffa500; animation: pulse 1s infinite; }
        .status-dot.speaking { background: var(--accent); animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }

        /* Transcript */
        .transcript {
            flex: 1; min-height: 0; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
            padding: 12px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--border);
            max-height: 55vh;
        }
        .msg {
            max-width: 85%; padding: 8px 14px; border-radius: 14px;
            font-size: 14px; line-height: 1.5; animation: fadeIn .3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }
        .msg.user { align-self: flex-end; background: var(--user-bubble); }
        .msg.tutor { align-self: flex-start; background: var(--tutor-bubble); }
        .msg.partial { opacity: 0.6; font-style: italic; }
        .msg .speaker { font-size: 11px; color: var(--muted); margin-bottom: 2px; display: block; }
        .msg .time { font-size: 10px; color: var(--muted); margin-top: 4px; }

        .empty-state {
            text-align: center; color: var(--muted); padding: 60px 20px;
            font-size: 15px; line-height: 1.6;
        }

        /* Audio playback */
        audio { display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🎤 IELTS Tutor v2.0</h1>
        <span class="pipeline-badge" id="pipelineBadge">管线1</span>
    </div>

    <div class="controls">
        <div>
            <label>模式</label>
            <select id="modeSelect">
                <option value="ielts_part1">IELTS Part 1</option>
                <option value="ielts_part2">IELTS Part 2</option>
                <option value="ielts_part3">IELTS Part 3</option>
                <option value="business_pitch">商业英语 Pitch</option>
                <option value="free_talk">自由对话</option>
            </select>
        </div>
        <div>
            <label>管线</label>
            <select id="pipelineSelect">
                <option value="cascade">管线1 · 链式流式</option>
                <option value="qwen-omni" disabled>管线2 · Qwen-Omni (即将上线)</option>
            </select>
        </div>
        <button class="btn-record btn-start" id="recordBtn" onclick="toggleRecording()">
            🎙️ 开始练习
        </button>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">就绪 · 选择模式后开始</span>
    </div>

    <div class="transcript" id="transcript">
        <div class="empty-state">
            👋 选择练习模式<br>
            <span style="font-size:13px">点击「开始练习」开始语音对话</span>
        </div>
    </div>

    <audio id="audioPlayer" controls></audio>
</div>

<script>
// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
let ws = null;
let sessionId = null;
let isRecording = false;
let mediaRecorder = null;
let audioContext = null;
let audioQueue = [];
let isPlaying = false;
let currentMode = 'ielts_part1';
const SERVER = `ws://${location.hostname}:8767`;

// ─────────────────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────────────────
async function connectSession() {
    const mode = document.getElementById('modeSelect').value;
    const pipeline = document.getElementById('pipelineSelect').value;
    currentMode = mode;

    const resp = await fetch(`http://${location.hostname}:8767/api/session/start`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({mode, pipeline})
    });
    const data = await resp.json();
    sessionId = data.session_id;

    document.getElementById('pipelineBadge').textContent = pipeline === 'qwen-omni' ? '管线2' : '管线1';
    if (pipeline === 'qwen-omni') document.getElementById('pipelineBadge').classList.add('p2');

    ws = new WebSocket(`${SERVER}/ws/chat/${sessionId}`);
    ws.onmessage = handleWSMessage;
    ws.onclose = () => setStatus('disconnected', '连接断开');
    ws.onerror = () => setStatus('disconnected', '连接错误');

    await new Promise(r => { ws.onopen = r; });
    setStatus('active', '已连接 · 开始说话');
}

function handleWSMessage(event) {
    const msg = JSON.parse(event.data);
    switch (msg.type) {
        case 'partial_transcript':
            updatePartial(msg.text);
            break;
        case 'final_transcript':
            appendMessage('user', msg.text);
            break;
        case 'response_text':
            appendMessage('tutor', msg.text);
            break;
        case 'audio':
            playAudioChunk(msg.data);
            break;
        case 'status':
            handleStatus(msg.state, msg);
            break;
        case 'error':
            setStatus('disconnected', '错误: ' + msg.msg);
            break;
    }
}

function handleStatus(state, msg) {
    const map = {
        'listening': ['active', '正在听...'],
        'thinking': ['thinking', '思考中...'],
        'speaking': ['speaking', '正在说...'],
        'stopped': ['disconnected', '已停止'],
        'mode_changed': ['active', `模式切换: ${msg.mode}`],
    };
    const [cls, text] = map[state] || ['disconnected', state];
    setStatus(cls, text);
}

function setStatus(cls, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot';
    if (cls !== 'disconnected') dot.classList.add(cls);
    document.getElementById('statusText').textContent = text;
}

function updatePartial(text) {
    const el = document.getElementById('partialMsg');
    if (el) {
        el.textContent = text;
    } else {
        const div = document.createElement('div');
        div.id = 'partialMsg';
        div.className = 'msg user partial';
        div.textContent = text;
        const t = document.getElementById('transcript');
        // remove empty state if present
        const empty = t.querySelector('.empty-state');
        if (empty) empty.remove();
        t.appendChild(div);
    }
}

function appendMessage(role, text) {
    // remove partial
    const partial = document.getElementById('partialMsg');
    if (partial) partial.remove();

    const t = document.getElementById('transcript');
    const empty = t.querySelector('.empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const now = new Date();
    div.innerHTML = `<span class="speaker">${role === 'user' ? '🧑 你' : '🎓 考官'}</span>${text}<div class="time">${now.toLocaleTimeString()}</div>`;
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
}

// ─────────────────────────────────────────────────────────
// Audio playback
// ─────────────────────────────────────────────────────────
function playAudioChunk(base64data) {
    audioQueue.push(base64data);
    if (!isPlaying) playNextInQueue();
}

function playNextInQueue() {
    if (audioQueue.length === 0) { isPlaying = false; return; }
    isPlaying = true;
    const b64 = audioQueue.shift();
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], {type: 'audio/mp3'});
    const url = URL.createObjectURL(blob);

    const player = document.getElementById('audioPlayer');
    player.src = url;
    player.onended = () => { URL.revokeObjectURL(url); playNextInQueue(); };
    player.play().catch(() => playNextInQueue());
}

// ─────────────────────────────────────────────────────────
// Recording
// ─────────────────────────────────────────────────────────
async function toggleRecording() {
    const btn = document.getElementById('recordBtn');
    if (isRecording) {
        stopRecording();
        btn.textContent = '🎙️ 开始练习';
        btn.className = 'btn-record btn-start';
    } else {
        await startRecording();
        btn.textContent = '⏹️ 停止';
        btn.className = 'btn-record btn-stop';
    }
}

async function startRecording() {
    // Reuse existing connection if still open
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        await connectSession();
    }

    const stream = await navigator.mediaDevices.getUserMedia({
        audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
    });

    audioContext = new AudioContext({sampleRate: 16000});
    const source = audioContext.createMediaStreamSource(stream);
    const processor = audioContext.createScriptProcessor(4096, 1, 1);

    source.connect(processor);
    processor.connect(audioContext.destination);

    processor.onaudioprocess = (e) => {
        if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const pcm = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++) {
            pcm[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
        }
        const b64 = btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)));
        ws.send(JSON.stringify({type: 'audio', data: b64}));
    };

    isRecording = true;
}

function stopRecording() {
    isRecording = false;
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (ws) {
        ws.send(JSON.stringify({type: 'stop'}));
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryson Voice MVP Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
        }
        .status {
            margin: 20px 0;
        }
        .success {
            color: #28a745;
            font-weight: bold;
        }
        .warning {
            color: #ffc107;
        }
        .qr-container {
            margin: 30px 0;
        }
        .qr-code {
            max-width: 300px;
            margin: 0 auto;
        }
        a {
            display: inline-block;
            margin: 15px;
            padding: 12px 24px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🌬️ Bryson Voice MVP Test</h1>
    
    <div class="container">
        <div class="status">
            <p><strong>Service URL:</strong> <a href="https://tasty-islands-like.loca.lt" target="_blank">https://tasty-islands-like.loca.lt</a></p>
            <p class="success">✅ Backend server running</p>
            <p class="success">✅ WebSocket endpoint ready</p>
            <p class="warning">⚠️ Mobile browser testing recommended</p>
        </div>
        
        <div class="qr-container">
            <h3>Scan QR Code on Mobile:</h3>
            <div class="qr-code">
                <img src="test_qr.png" alt="Test QR Code" width="300">
            </div>
        </div>
        
        <div>
            <h3>Test Links:</h3>
            <a href="https://tasty-islands-like.loca.lt" target="_blank">Open in Browser</a>
            <a href="https://tasty-islands-like.loca.lt#webrtc" target="_blank">Test WebRTC</a>
            <a href="https://tasty-islands-like.loca.lt/api/status" target="_blank">Check Status</a>
        </div>
    </div>
    
    <footer>
        <p>📊 Server status: <a href="https://tasty-islands-like.loca.lt/api/status" target="_blank">API Status</a></p>
    </footer>
</body>
</html>

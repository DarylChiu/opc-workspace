<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频分析交互Workflow</title>
<style>
:root {
  --bg: #0f0f0f;
  --panel-bg: #1a1a1a;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #3b82f6;
  --accent-dim: #1e3a5f;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --card-bg: #222;
  --card-hover: #2a2a2a;
  --card-active: #1a2740;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
}
.app { display: flex; height: calc(100vh - 44px); }

/* ── 左侧 Sidebar ── */
.sidebar {
  width: 56px; min-width: 56px; background: #111;
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  padding-top: 8px; transition: width 0.2s; overflow: hidden;
  z-index: 10;
}
.sidebar:hover { width: 180px; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  cursor: pointer; color: var(--text-dim); font-size: 13px; white-space: nowrap;
  transition: all 0.15s; border-left: 2px solid transparent;
}
.sidebar-item:hover { background: #1a1a1a; color: var(--text); }
.sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: #161616; }
.sidebar-item .si-icon { font-size: 18px; min-width: 24px; text-align: center; }
.sidebar-item .si-label { opacity: 0; transition: opacity 0.2s; }
.sidebar:hover .sidebar-item .si-label { opacity: 1; }
.sidebar-item .si-badge {
  display: inline-block; background: var(--accent-dim); color: var(--accent);
  font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: auto;
}

/* ── 素材库表格 ── */
.material-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.material-table th {
  text-align: left; padding: 8px 12px; color: var(--text-dim);
  font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--panel-bg); z-index: 1;
}
.material-table td {
  padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.material-table tr { cursor: pointer; transition: background 0.1s; }
.material-table tr:hover { background: var(--card-hover); }
.material-table tr.loaded { background: var(--card-active); }
.material-table .platform-tag {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 10px; background: #1a2740; color: var(--accent);
}

/* ── 左侧：视频+对白卡片 ── */
.panel-left { 
  width: 380px; min-width: 380px; background: var(--panel-bg);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  transition: width 0.3s, min-width 0.3s;
}
/* 横屏模式：视频在上，对白在下（默认） */
.panel-left.layout-side {
  width: 560px; min-width: 560px;
}
.panel-left .video-transcript-row {
  display: flex; flex-direction: column; flex: 1; min-height: 0;
}
.panel-left.layout-side .video-transcript-row {
  display: flex; flex-direction: row; flex: 1; min-height: 0;
}
.panel-left.layout-side .video-container {
  width: 55%; flex-shrink: 0; aspect-ratio: auto !important;
  display: flex; align-items: center; justify-content: center;
}
.panel-left.layout-side .video-container video {
  max-width: 100%; max-height: 100%; object-fit: contain;
}
.panel-left.layout-side .transcript-col {
  width: 45%; flex-shrink: 0; display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
}
.video-container { position: relative; background: #000; aspect-ratio: 16/9; }
.video-container video { width: 100%; height: 100%; object-fit: contain; }
.video-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--text-dim);
}
.video-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }

.section-header {
  padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text-dim);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
  align-items: center; background: #161616;
}
.transcript-list { flex: 1; overflow-y: auto; }

.transcript-card {
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: all 0.15s; display: flex; gap: 10px; align-items: flex-start;
  border-left: 3px solid transparent;
}
.transcript-card:hover { background: var(--card-hover); }
.transcript-card.active { 
  background: var(--card-active); border-left-color: var(--accent);
}
.transcript-card.marked-hook { border-left-color: var(--green); background: #0a2a0a; }
.transcript-card.marked-gold { border-left-color: var(--yellow); background: #2a2400; }
.transcript-card.marked-turn { border-left-color: var(--red); background: #2a0a0a; }

.card-timestamp { 
  font-size: 11px; color: var(--accent); min-width: 40px; font-variant-numeric: tabular-nums;
  font-family: 'SF Mono', Monaco, monospace; padding-top: 2px;
}
.card-content { flex: 1; }
.card-tag { 
  font-size: 10px; color: var(--text-dim); margin-bottom: 3px; 
}
.card-text { font-size: 13px; line-height: 1.5; }
.card-actions {
  display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s;
}
.transcript-card:hover .card-actions { opacity: 1; }

.mark-btn {
  width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; font-size: 11px; display: flex;
  align-items: center; justify-content: center; color: var(--text-dim);
}
.mark-btn:hover { border-color: var(--text); }
.mark-btn.hook:hover, .mark-btn.hook.active { background: var(--green); border-color: var(--green); color: #000; }
.mark-btn.gold:hover, .mark-btn.gold.active { background: var(--yellow); border-color: var(--yellow); color: #000; }
.mark-btn.turn:hover, .mark-btn.turn.active { background: var(--red); border-color: var(--red); color: #fff; }

/* ── 中间：分析面板 ── */
.panel-center { 
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.tabs { 
  display: flex; border-bottom: 1px solid var(--border); background: #161616;
  flex-shrink: 0;
}
.tab { 
  padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--text-dim);
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .badge {
  display: inline-block; background: var(--accent-dim); color: var(--accent);
  font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px;
}

.analysis-content { flex: 1; overflow-y: auto; padding: 20px; }

.analysis-section { margin-bottom: 24px; }
.analysis-section h3 { 
  font-size: 14px; font-weight: 600; margin-bottom: 10px; 
  display: flex; align-items: center; gap: 8px;
}
.analysis-section h3 .icon { font-size: 16px; }

.template-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px;
}
.template-card h4 { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
.template-card .desc { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
.template-card .formula {
  background: #111; border: 1px solid var(--border); border-radius: 6px;
  padding: 12px; font-size: 13px; line-height: 1.6; font-family: 'SF Mono', Monaco, monospace;
  white-space: pre-wrap;
}
.template-card .placeholder { 
  background: var(--accent-dim); color: var(--accent); 
  padding: 1px 4px; border-radius: 3px; font-size: 12px;
}

.score-row {
  display: flex; gap: 16px; margin-bottom: 16px;
}
.score-card {
  flex: 1; background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; text-align: center;
}
.score-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.score-card .value { font-size: 28px; font-weight: 700; }
.score-card .value.high { color: var(--green); }
.score-card .value.mid { color: var(--yellow); }
.score-card .value.low { color: var(--red); }
.score-card .reason { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

.knowledge-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px;
}
.knowledge-card h4 { font-size: 13px; margin-bottom: 10px; }
.knowledge-card .field { margin-bottom: 8px; }
.knowledge-card .field-label { 
  font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 2px;
}
.knowledge-card .field-value { font-size: 13px; line-height: 1.5; }
.knowledge-card .jump-btn {
  display: inline-block; margin-top: 8px; padding: 4px 10px;
  background: var(--accent-dim); color: var(--accent); border-radius: 4px;
  font-size: 11px; cursor: pointer; border: none;
}
.knowledge-card .jump-btn:hover { background: var(--accent); color: #fff; }

.empty-state {
  display: flex; align-items: center; justify-content: center; height: 100%;
  color: var(--text-dim); font-size: 14px; flex-direction: column; gap: 8px;
}

/* ── 右侧：已废弃，标记功能整合进分析面板 Tab ── */
.panel-right { display: none; }
.mark-summary { padding: 14px; border-bottom: 1px solid var(--border); }
.mark-summary .count-row {
  display: flex; gap: 12px; margin-top: 8px;
}
.mark-summary .count-item {
  display: flex; align-items: center; gap: 4px; font-size: 12px;
}
.mark-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.mark-dot.hook { background: var(--green); }
.mark-dot.gold { background: var(--yellow); }
.mark-dot.turn { background: var(--red); }

.marked-list { flex: 1; overflow-y: auto; }
.marked-item {
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px; cursor: pointer;
}
.marked-item:hover { background: var(--card-hover); }
.marked-item .ts { color: var(--accent); font-family: monospace; }
.marked-item .text { margin-top: 4px; line-height: 1.4; }

.export-bar {
  padding: 12px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.btn {
  padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
  transition: all 0.15s;
}
.btn:hover { background: var(--card-hover); border-color: var(--text-dim); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #2563eb; }
.btn.small { padding: 3px 8px; font-size: 11px; }

/* ── 顶部栏 ── */
.topbar {
  height: 44px; background: #161616; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  flex-shrink: 0;
}
.topbar .logo { font-weight: 700; font-size: 14px; color: var(--accent); }
.topbar input {
  flex: 1; max-width: 400px; padding: 6px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
  font-size: 12px; outline: none;
}
.topbar input:focus { border-color: var(--accent); }
.topbar .status { font-size: 11px; color: var(--text-dim); margin-left: auto; }
.topbar .status .dot { 
  width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px;
}
.topbar .status .dot.idle { background: var(--text-dim); }
.topbar .status .dot.running { background: var(--yellow); animation: pulse 1s infinite; }
.topbar .status .dot.done { background: var(--green); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 滚动条 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">🎬 视频深度分析</span>
  <input type="text" placeholder="粘贴抖音/B站/YouTube链接后回车..." id="urlInput" 
    onkeydown="if(event.key==='Enter')analyzeFromUrl()">
  <button class="btn primary small" onclick="analyzeFromUrl()">🔗 分析链接</button>
  <button class="btn primary small" onclick="analyzeWithDeepSeek()" style="background:#1a3a1a;border-color:#22c55e">🧠 Demo 深度分析</button>
  <span class="status" id="statusBar">
    <span class="dot idle"></span> 就绪
  </span>
</div>

<!-- 左侧 Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-item active" onclick="switchView('workbench')">
    <span class="si-icon">🖥️</span>
    <span class="si-label">操作台</span>
  </div>
  <div class="sidebar-item" onclick="switchView('library')">
    <span class="si-icon">📚</span>
    <span class="si-label">素材库</span>
    <span class="si-badge" id="libBadge">0</span>
  </div>
</div>

<div class="app" id="mainApp">
  <!-- 左侧：视频+对白 -->
  <div class="panel-left" id="panelLeft">
    <div class="video-transcript-row">
      <div class="video-container" id="videoContainer">
        <div class="video-placeholder">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span>粘贴链接或拖入视频</span>
        </div>
        <video id="videoPlayer" style="display:none" controls 
          ontimeupdate="onVideoTimeUpdate()" onloadedmetadata="onVideoLoaded()">
        </video>
      </div>
      <div class="transcript-col">
        <div class="section-header">
          <span>📝 原文时间轴</span>
          <span id="cardCount" style="font-size:11px;color:var(--text-dim)">0 条</span>
        </div>
        <div class="transcript-list" id="transcriptList">
          <div class="empty-state" style="padding:40px">上传视频后自动转写</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 中间：分析面板 -->
  <div class="panel-center">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview')">📊 内容总览</div>
      <div class="tab" onclick="switchTab('script')">🎬 脚本解析</div>
      <div class="tab" onclick="switchTab('template')">📋 复刻模板</div>
      <div class="tab" onclick="switchTab('cinematography')">🎥 镜头&声音</div>
      <div class="tab" onclick="switchTab('score')">⭐ 三项评分</div>
      <div class="tab" onclick="switchTab('marks')">🏷️ 标记 <span class="badge" id="marksBadge">0</span></div>
    </div>
    <div class="analysis-content" id="analysisContent">
      <div class="empty-state">
        <span style="font-size:32px">🔍</span>
        <span>输入视频链接开始深度分析</span>
        <span style="font-size:11px;color:var(--text-dim)">支持：画面分析 + 对白转写 + 结构拆解 + 知识提取</span>
      </div>
    </div>
  </div>
</div>

<!-- 素材库视图（默认隐藏） -->
<div class="panel-center" id="libraryView" style="display:none">
  <div class="section-header">
    <span>📚 素材库</span>
    <span style="font-size:11px;color:var(--text-dim)" id="libCount">0 条素材</span>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0">
    <table class="material-table">
      <thead><tr>
        <th style="width:30px">#</th>
        <th>视频链接</th>
        <th>博主名称</th>
        <th style="width:70px">平台</th>
        <th style="width:80px">类型</th>
        <th style="width:120px">收录时间</th>
      </tr></thead>
      <tbody id="materialTableBody">
        <tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:40px">
          暂无素材，在「操作台」分析视频后自动收录
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ── 数据存储 ──
let transcriptData = [];
let analysisData = {};
let marks = []; // {id, timestamp, text, type: 'hook'|'gold'|'turn'}
let activeCardIdx = -1;
let videoServingUrl = '';
let currentVideoUrl = '';  // 当前分析的视频链接
let currentVideoTitle = '';
let savedMarksHistory = {}; // {videoUrl: {marks, transcript, analysis}}
let materialLibrary = []; // [{url, title, platform, type, date, marks, transcript, analysis, videoUrl}]

// 加载本地存储
function loadLibrary() {
  try {
    const saved = localStorage.getItem('video_analyzer_library');
    if (saved) materialLibrary = JSON.parse(saved);
    document.getElementById('libBadge').textContent = materialLibrary.length;
    document.getElementById('libCount').textContent = materialLibrary.length + ' 条素材';
  } catch(e) {}
}
function saveLibrary() {
  try {
    localStorage.setItem('video_analyzer_library', JSON.stringify(materialLibrary));
    document.getElementById('libBadge').textContent = materialLibrary.length;
    document.getElementById('libCount').textContent = materialLibrary.length + ' 条素材';
  } catch(e) {}
}

// ── Sidebar 视图切换 ──
function switchView(view) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const mainApp = document.getElementById('mainApp');
  const libView = document.getElementById('libraryView');
  
  if (view === 'library') {
    mainApp.style.display = 'none';
    libView.style.display = 'flex';
    document.querySelectorAll('.sidebar-item')[1].classList.add('active');
    renderLibraryTable();
  } else {
    mainApp.style.display = 'flex';
    libView.style.display = 'none';
    document.querySelectorAll('.sidebar-item')[0].classList.add('active');
  }
}

function renderLibraryTable() {
  const tbody = document.getElementById('materialTableBody');
  if (materialLibrary.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:40px">暂无素材，在「操作台」分析视频后自动收录</td></tr>';
    return;
  }
  tbody.innerHTML = materialLibrary.map((m, i) => `
    <tr onclick="loadMaterial(${i})" class="${m.url === currentVideoUrl ? 'loaded' : ''}">
      <td style="color:var(--text-dim)">${i+1}</td>
      <td title="${m.url}">${m.url.substring(0, 50)}...</td>
      <td>${m.title || '-'}</td>
      <td><span class="platform-tag">${m.platform || '-'}</span></td>
      <td style="color:var(--text-dim)">${m.type || '-'}</td>
      <td style="color:var(--text-dim)">${m.date || '-'}</td>
    </tr>
  `).join('');
}

function loadMaterial(idx) {
  const m = materialLibrary[idx];
  if (!m) return;
  
  // 恢复数据
  transcriptData = m.transcript || [];
  analysisData = normalizeAnalysis(m.analysis || {});
  marks = m.marks || [];
  currentVideoUrl = m.url;
  currentVideoTitle = m.title || '';
  videoServingUrl = m.videoUrl || '';
  
  // 如果有视频，设置 src
  const vp = document.getElementById('videoPlayer');
  if (videoServingUrl) {
    vp.src = videoServingUrl;
    vp.style.display = 'block';
    document.querySelector('.video-placeholder').style.display = 'none';
  }
  
  // 回到操作台
  switchView('workbench');
  
  // 渲染
  renderTranscript();
  updateCardCount();
  renderMarks();
  renderTabContent('overview');
}

// ── 归一化 API 返回的 key 名称 ──
function normalizeAnalysis(data) {
  if (!data) return data;
  // API返回 key → 前端期望 key
  if (data.script_analysis && !data.scriptAnalysis) data.scriptAnalysis = data.script_analysis;
  if (data.cinematography && !data.cinematography) data.cinematography = data.cinematography;
  if (data.scoring && !data.scores) data.scores = data.scoring;
  // 模板：兼容新旧格式
  if (data.template && typeof data.template === 'object' && !Array.isArray(data.template)) {
    data.template = data.template; // 新格式：{templates:[], reusableElements:{}}
  } else if (Array.isArray(data.template)) {
    data.template = { templates: data.template, reusableElements: {} };
  } else if (Array.isArray(data.templates)) {
    data.template = { templates: data.templates, reusableElements: {} };
  }
  // 兼容旧格式
  if (data.structure && !data.scriptAnalysis) data.scriptAnalysis = { acts: data.structure.map(s => ({act:s.start, name:s.name, timeRange:s.start+'-'+s.end, narrativeFunction:s.desc, characterDynamics:'', dramaticTension:5, keyMoments:[]})), techniques:[] };
  if (data.knowledge_card && !data.cinematography) data.cinematography = { disclaimer: '⚠️ 旧版数据，镜头语言分析不可用。请用新版分析。' };
  return data;
}

// ── 模拟数据（开发用） ──
const DEMO_TRANSCRIPT = [
  {ts:"00:00", tag:"开场", text:"下班后不知道吃什么？今天分享三个十分钟搞定的快手菜"},
  {ts:"00:04", tag:"推荐", text:"第一个是蒜蓉西兰花，简单到离谱但好吃到舔盘"},
  {ts:"00:09", tag:"步骤", text:"西兰花切小朵焯水一分钟，蒜切末，热油爆香"},

// ── 初始化 ──
function loadDemo() {
  transcriptData = DEMO_TRANSCRIPT;
  analysisData = DEMO_ANALYSIS;
  renderTranscript();
  updateCardCount();
}

function renderTranscript() {
  const list = document.getElementById('transcriptList');
  list.innerHTML = transcriptData.map((card, i) => {
    const mark = marks.find(m => m.id === i);
    let markClass = '';
    if (mark) markClass = 'marked-' + mark.type;
    if (i === activeCardIdx && !mark) markClass += ' active';
    if (i === activeCardIdx && mark) markClass += ' active';
    
    return `
    <div class="transcript-card ${markClass}" id="card-${i}" onclick="seekTo(${i})">
      <div class="card-timestamp">${card.ts}</div>
      <div class="card-content">
        <div class="card-tag">${card.tag}</div>
        <div class="card-text">${card.text}</div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        ${mark ? `<button class="mark-btn ${mark.type} active" title="删除标记" onclick="removeMark(${i})" style="background:var(--${mark.type==='hook'?'green':mark.type==='gold'?'yellow':'red'});color:#000">✕</button>` : ''}
        <button class="mark-btn hook ${mark?.type==='hook'?'active':''}" 
          title="好钩子" onclick="toggleMark(${i},'hook')">🪝</button>
        <button class="mark-btn gold ${mark?.type==='gold'?'active':''}" 
          title="金句" onclick="toggleMark(${i},'gold')">⭐</button>
        <button class="mark-btn turn ${mark?.type==='turn'?'active':''}" 
          title="转折点" onclick="toggleMark(${i},'turn')">↗</button>
      </div>
    </div>`;
  }).join('');
}

function updateCardCount() {
  document.getElementById('cardCount').textContent = transcriptData.length + ' 条';
}

// ── 视频联动 ──
function seekTo(idx) {
  activeCardIdx = idx;
  const card = transcriptData[idx];
  // 解析时间戳 MM:SS → seconds
  const [m, s] = card.ts.split(':').map(Number);
  const seconds = m * 60 + s;
  
  const video = document.getElementById('videoPlayer');
  if (video.src) {
    video.currentTime = seconds;
    video.play().catch(()=>{});
  }
  
  renderTranscript();
  document.getElementById(`card-${idx}`)?.scrollIntoView({behavior:'smooth',block:'center'});
}

function onVideoTimeUpdate() {
  const video = document.getElementById('videoPlayer');
  const currentSec = video.currentTime;
  // 找到当前播放位置对应的卡片
  let newActive = -1;
  for (let i = 0; i < transcriptData.length; i++) {
    const [m, s] = transcriptData[i].ts.split(':').map(Number);
    const cardSec = m * 60 + s;
    if (currentSec >= cardSec - 0.5) newActive = i;
  }
  if (newActive !== activeCardIdx) {
    activeCardIdx = newActive;
    renderTranscript();
    document.getElementById(`card-${newActive}`)?.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function onVideoLoaded() {
  const vp = document.getElementById('videoPlayer');
  vp.style.display = 'block';
  document.querySelector('.video-placeholder').style.display = 'none';
  
  // 检测视频比例，切换布局
  const ratio = vp.videoWidth / vp.videoHeight;
  const panelLeft = document.getElementById('panelLeft');
  if (ratio < 1) {
    // 竖屏视频：视频在左，对白在右
    panelLeft.classList.add('layout-side');
    vp.parentElement.style.aspectRatio = 'auto';
    vp.parentElement.style.height = '100%';
  } else {
    // 横屏视频：视频在上，对白在下
    panelLeft.classList.remove('layout-side');
    vp.parentElement.style.aspectRatio = '16/9';
    vp.parentElement.style.height = 'auto';
  }
}

// ── 标记系统 ──
function toggleMark(idx, type) {
  const existing = marks.findIndex(m => m.id === idx);
  if (existing >= 0) {
    if (marks[existing].type === type) {
      marks.splice(existing, 1); // 取消标记
    } else {
      marks[existing].type = type; // 切换标记类型
    }
  } else {
    marks.push({ id:idx, timestamp:transcriptData[idx].ts, text:transcriptData[idx].text, type });
  }
  renderTranscript();
  renderMarks();
}

function clearMarks() { marks = []; renderTranscript(); renderMarks(); }

function removeMark(idx) {
  marks = marks.filter(m => m.id !== idx);
  renderTranscript();
  renderMarks();
}

function saveMarksToLibrary() {
  // 更新当前视频在素材库中的标记
  const existing = materialLibrary.findIndex(m => m.url === currentVideoUrl);
  if (existing >= 0) {
    materialLibrary[existing].marks = [...marks];
    materialLibrary[existing].analysis = analysisData;
    materialLibrary[existing].transcript = transcriptData;
    saveLibrary();
    alert('标记已保存到素材库');
  } else if (currentVideoUrl) {
    saveCurrentToLibrary();
    alert('已保存到素材库');
  } else {
    alert('请先分析视频');
  }
}

function saveCurrentToLibrary() {
  if (!currentVideoUrl) return;
  const existing = materialLibrary.findIndex(m => m.url === currentVideoUrl);
  const entry = {
    url: currentVideoUrl,
    title: currentVideoTitle || '未命名',
    platform: detectPlatform(currentVideoUrl),
    type: '视频分析',
    date: new Date().toISOString().slice(0, 10),
    marks: [...marks],
    transcript: transcriptData,
    analysis: analysisData,
    videoUrl: videoServingUrl
  };
  if (existing >= 0) {
    materialLibrary[existing] = entry;
  } else {
    materialLibrary.unshift(entry);
  }
  saveLibrary();
}

function addToLibrary(url, data) {
  const existing = materialLibrary.findIndex(m => m.url === url);
  const entry = {
    url: url,
    title: currentVideoTitle || (data.transcript && data.transcript[0] ? data.transcript[0].text.substring(0, 30) : '未命名'),
    platform: detectPlatform(url),
    type: '视频分析',
    date: new Date().toISOString().slice(0, 10),
    marks: [],
    transcript: data.transcript || [],
    analysis: data.analysis || {},
    videoUrl: videoServingUrl
  };
  if (existing >= 0) {
    materialLibrary[existing] = entry;
  } else {
    materialLibrary.unshift(entry);
  }
  saveLibrary();
}

function detectPlatform(url) {
  if (url.includes('douyin.com')) return '抖音';
  if (url.includes('bilibili.com') || url.includes('b23.tv')) return 'B站';
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'YouTube';
  if (url.includes('xiaohongshu.com') || url.includes('xhslink.com')) return '小红书';
  return '其他';
}

function renderMarks() {
  // 更新标记 badge
  document.getElementById('marksBadge').textContent = marks.length;
  
  // 如果当前在标记 tab，刷新内容
  const activeTab = document.querySelector('.tab.active');
  if (activeTab && activeTab.textContent.includes('标记')) {

}

        <button class="btn small" onclick="exportFullReport()">📄 导出完整报告</button>

          <div style="flex:1" onclick="seekTo(${m.id})">

        </div>

// ── 导出 ──
function exportMarks() {
  if (marks.length === 0) { alert('还没有标记内容'); return; }
  const typeLabel = { hook:'好钩子', gold:'金句', turn:'转折点' };
  const text = marks.map(m => `[${m.timestamp}] [${typeLabel[m.type]}] ${m.text}`).join('\n');
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `marks_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

function exportFullReport() {
  if (!analysisData.overview) { alert('还没有分析数据'); return; }
  const ad = analysisData;
  const sa = ad.scriptAnalysis || {};
  const cm = ad.cinematography || {};
  
  let text = `# 视频分析报告\n\n> 生成时间：${new Date().toLocaleString()}\n\n---\n\n## 📊 内容总览\n\n**一句话总结：**${ad.overview.oneLiner}\n\n**目标受众：**${ad.overview.audience}\n\n**核心痛点：**${ad.overview.painPoints}\n\n**核心观点：**${ad.overview.viewpoint}\n\n**认知转化：**${ad.overview.cognition}\n\n---\n\n## 🎬 脚本解析\n\n`;
  (sa.acts||[]).forEach(a => text += `### ${a.name} (${a.timeRange})\n\n- **叙事功能：**${a.narrativeFunction}\n- **人物动态：**${a.characterDynamics}\n- **戏剧张力：**${a.dramaticTension}/10\n${(a.keyMoments||[]).map(m => `- [${m.ts}] ${m.desc}`).join('\n')}\n\n`);
  if (sa.emotionCurve) text += `**情绪曲线：**${sa.emotionCurve}\n\n`;
  
  text += `---\n\n## 📋 复刻模板\n\n`;
  const tp = ad.template || {};
  (tp.templates||ad.templates||[]).forEach(t => text += `### ${t.name}\n${t.desc}\n\n**公式：**${(t.formula||'').replace(/【(.*?)】/g,'【$1】')}\n\n`);
  
  text += `---\n\n## 🎥 镜头&声音\n\n`;
  if (cm.disclaimer) text += `> ${cm.disclaimer}\n\n`;
  const c = cm.cinematography||{}; const lc=cm.lightingColor||{}; const sd=cm.soundDesign||{}; const ds=cm.directorStyle||{};
  text += `**景别策略：**${c.shotTypes}\n**构图策略：**${c.composition}\n**摄影机运动：**${c.cameraMovement}\n\n**光线风格：**${lc.lightingMood}\n**色彩策略：**${lc.colorPalette}\n**视觉节奏：**${lc.visualRhythm}\n\n**BGM：**${sd.bgm}\n**环境音：**${sd.ambient}\n**对白风格：**${sd.dialogueStyle}\n\n**美学取向：**${ds.aesthetic}\n**叙事签名：**${ds.narrativeSignature}\n`;
  
  text += `\n---\n\n## ⭐ 三项评分\n\n- Hook设计：${ad.scores.hook.value}/100 — ${ad.scores.hook.reason}\n- 结构设计：${ad.scores.structure.value}/100 — ${ad.scores.structure.reason}\n- 表达效果：${ad.scores.expression.value}/100 — ${ad.scores.expression.reason}\n`;
  
  const blob = new Blob([text], {type:'text/markdown'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `video_report_${new Date().toISOString().slice(0,10)}.md`;
  a.click();
}

function switchTab(tab) {
  const tabNames = ['overview','script','template','cinematography','score','marks'];
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', tabNames[i] === tab);
  });
  if (tab === 'marks') {
    renderMarkTab();
  } else {
    renderTabContent(tab);
  }
}

// ── 从 URL 分析 ──
async function analyzeFromUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('请粘贴视频链接'); return; }
  
  // 自动保存上一条视频的标记和结果
  if (currentVideoUrl && currentVideoUrl !== url && (marks.length > 0 || transcriptData.length > 0)) {
    saveCurrentToLibrary();
  }
  
  setStatus('running', '下载视频并转写中...');
  switchTab('overview');
  document.getElementById('analysisContent').innerHTML = `
    <div class="empty-state">
      <span style="font-size:32px">📥</span>
      <span>正在处理视频...</span>
      <span style="font-size:11px;color:var(--text-dim)">${url}</span>
    </div>`;
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 60000); // 60s 超时
  
  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: url}),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    
    const data = await resp.json();
    
    if (data.error) {
      setStatus('done', '⚠️ 处理失败');
      document.getElementById('analysisContent').innerHTML = `
        <div class="empty-state">
          <span style="font-size:32px">⚠️</span>
          <span>${data.error}</span>
          <span style="font-size:11px;color:var(--text-dim)">小提示：用右边「🧠 Demo 深度分析」体验完整功能</span>
        </div>`;
      return;
    }
    
    if (data.transcript && data.transcript.length > 0) {
      transcriptData = data.transcript;
      renderTranscript();
      updateCardCount();
    }
    
    if (data.analysis && data.analysis.overview) {
      analysisData = normalizeAnalysis(data.analysis);
      // 设置视频播放源
      if (data.video_url) {
        videoServingUrl = data.video_url;
        const vp = document.getElementById('videoPlayer');
        vp.src = data.video_url;
        vp.style.display = 'block';
        document.querySelector('.video-placeholder').style.display = 'none';
      }
      // 清空旧视频的标记
      marks = [];
      currentVideoUrl = url;
      
      // 自动收录到素材库
      addToLibrary(url, data);
      
      setStatus('done', '✅ 分析完成');
    } else {
      setStatus('done', '⚠️ 转写成功但分析未完成');
    }
    
  } catch(e) {
    clearTimeout(timeoutId);
    const isTimeout = e.name === 'AbortError';
    const msg = isTimeout ? '请求超时（>60秒）。视频下载或转写耗时过长，请用「🧠 Demo 深度分析」体验' : e.message;
    setStatus('done', '⚠️ ' + (isTimeout ? '请求超时' : '处理失败'));
    document.getElementById('analysisContent').innerHTML = `
      <div class="empty-state">
        <span style="font-size:32px">${isTimeout ? '⏱️' : '🔌'}</span>
        <span>${isTimeout ? '请求超时' : '连接失败'}</span>
        <span style="font-size:13px;color:var(--text-dim);margin-top:8px">${msg}</span>
        <span style="font-size:11px;color:var(--text-dim);margin-top:12px">💡 点击「🧠 Demo 深度分析」用演示数据测试完整功能</span>
      </div>`;
  }
}

// ── DeepSeek 分析（Demo 数据）──
async function analyzeWithDeepSeek() {
  setStatus('running', 'DeepSeek 分析中...');
  
  // 切换到 overview tab 显示加载状态
  switchTab('overview');
  document.getElementById('analysisContent').innerHTML = `
    <div class="empty-state">
      <span style="font-size:32px">🧠</span>
      <span>DeepSeek V4 Pro 正在分析...</span>
      <span style="font-size:11px;color:var(--text-dim)">总览 → 脚本解析 → 复刻模板 → 镜头&声音 → 评分</span>
    </div>`;
  
  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({transcript: transcriptData})
    });
    
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || 'API error');
    }
    
    const data = await resp.json();
    
    // 用真实分析结果更新数据
    if (data.analysis && data.analysis.overview) {
      analysisData = normalizeAnalysis(data.analysis);
      setStatus('done', '✅ DeepSeek 分析完成');
    } else {
      setStatus('done', '⚠️ 分析返回为空，使用 Demo 数据');
    }
    
    // 更新转录数据（如果有新的）
    if (data.transcript && data.transcript.length > 0) {
      transcriptData = data.transcript;
      renderTranscript();
      updateCardCount();
    }
    
    renderTabContent('overview');
    
  } catch(e) {
    console.error('DeepSeek analysis failed:', e);
    setStatus('done', '⚠️ API 不可用，显示 Demo 数据');
    renderTabContent('overview');
  }
}

function setStatus(state, msg) {
  const icons = { idle:'idle', running:'running', done:'done' };
  document.getElementById('statusBar').innerHTML = 
    `<span class="dot ${icons[state]}"></span> ${msg}`;
}

// 启动
loadLibrary();
loadDemo();
renderTabContent('overview');
</script>

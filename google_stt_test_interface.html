<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google STT 测试界面 - Bryson IELTS陪练助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            margin-top: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #1a237e;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #1a237e, #3949ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 1.2rem;
            color: #5c6bc0;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        .card h2 {
            color: #1a237e;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2:before {
            content: "";
            width: 6px;
            height: 24px;
            background: #3949ab;
            border-radius: 3px;
        }

        .status-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .status-item {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            background: #f5f7ff;
            text-align: center;
        }

        .status-item.success {
            border-left: 4px solid #4caf50;
        }

        .status-item.info {
            border-left: 4px solid #2196f3;
        }

        .status-item.warning {
            border-left: 4px solid #ff9800;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1;
            min-width: 180px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #2196f3, #1976d2);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #1976d2, #0d47a1);
            transform: scale(1.05);
        }

        .btn-danger {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(45deg, #d32f2f, #b71c1c);
            transform: scale(1.05);
        }

        .btn-success {
            background: linear-gradient(45deg, #4caf50, #388e3c);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(45deg, #388e3c, #2e7d32);
            transform: scale(1.05);
        }

        .audio-controls {
            margin-top: 20px;
        }

        .audio-wave {
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, #e8eaf6, #f5f7ff);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }

        .audio-wave canvas {
            width: 100%;
            height: 100%;
        }

        .recording-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #f44336;
            font-weight: bold;
            display: none;
        }

        .result-section {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-section h3 {
            color: #3949ab;
            margin-bottom: 10px;
        }

        .result-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #3949ab;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 15px;
            overflow-y: auto;
            max-height: 200px;
        }

        .confidence-meter {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .confidence-bar {
            flex: 1;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            width: 0%;
            transition: width 0.5s ease;
        }

        .info-tip {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #1565c0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .status-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Google Speech-to-Text 测试界面</h1>
            <div class="subtitle">Bryson IELTS陪练助手 - STT集成测试平台</div>
        </div>

        <!-- 系统状态 -->
        <div class="card">
            <h2>📊 系统状态</h2>
            <div class="status-section">
                <div class="status-item success">
                    <div style="font-size: 2rem; margin-bottom: 10px;">✅</div>
                    <strong>API密钥</strong>
                    <div id="apiKeyStatus" style="font-size: 0.9rem; color: #666;">已验证</div>
                </div>
                <div class="status-item info">
                    <div style="font-size: 2rem; margin-bottom: 10px;">🎙️</div>
                    <strong>录音状态</strong>
                    <div id="recordingStatus" style="font-size: 0.9rem; color: #666;">就绪</div>
                </div>
                <div class="status-item warning">
                    <div style="font-size: 2rem; margin-bottom: 10px;">🔄</div>
                    <strong>测试次数</strong>
                    <div id="testCount" style="font-size: 0.9rem; color: #666;">0</div>
                </div>
            </div>
        </div>

        <!-- 音频录制 -->
        <div class="card">
            <h2>🎙️ 录音控制</h2>
            <div class="audio-controls">
                <div class="audio-wave" id="audioWave">
                    <div class="recording-indicator" id="recordingIndicator">
                        🔴 录音中...
                    </div>
                    <canvas id="waveCanvas"></canvas>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-primary" onclick="startRecording()" id="startBtn">
                        🔴 开始录音
                    </button>
                    <button class="btn btn-danger" onclick="stopRecording()" disabled id="stopBtn">
                        ⏹️ 停止录音
                    </button>
                    <button class="btn btn-success" onclick="playTestAudio()" id="playTestBtn">
                        🎧 播放测试音频
                    </button>
                    <button class="btn btn-primary" onclick="uploadAudioFile()" id="uploadBtn">
                        📁 上传音频文件
                    </button>
                </div>
            </div>
            
            <div class="info-tip">
                💡 提示：录音最长支持60秒，支持英语和中文普通话。请确保在有网络的环境下测试。
            </div>
        </div>

        <!-- STT测试 -->
        <div class="card">
            <h2>🔤 语音转文本测试</h2>
            <div class="button-group">
                <button class="btn btn-primary" onclick="testDirectSTT()">
                    🚀 测试直接API调用
                </button>
                <button class="btn btn-success" onclick="testIELTSSample()">
                    📚 测试IELTS样本
                </button>
            </div>
            
            <div class="result-section" id="sttResultSection" style="display: none;">
                <h3>📝 转写结果</h3>
                <div class="result-box" id="transcriptionResult">
                    <!-- 结果将显示在这里 -->
                </div>
                
                <div style="display: flex; justify-content: space-between;">
                    <div>
                        <strong>转写语言:</strong> <span id="languageLabel" style="color: #3949ab;">英语</span>
                    </div>
                    <div class="confidence-meter">
                        <strong>置信度:</strong>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill"></div>
                        </div>
                        <span id="confidenceValue">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- API配置 -->
        <div class="card">
            <h2>⚙️ API配置</h2>
            <div style="margin: 15px 0;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">
                    Google API密钥 (前缀为AIzaSy...):
                </label>
                <input type="text" 
                       id="apiKeyInput" 
                       style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;"
                       placeholder="输入你的Google API密钥">
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="validateAPIKey()">
                    🔍 验证API密钥
                </button>
                <button class="btn btn-success" onclick="saveConfiguration()">
                    💾 保存配置
                </button>
            </div>
            
            <div class="info-tip">
                🔒 密钥仅保存在浏览器本地存储中，不会被发送到服务器。
            </div>
        </div>

        <!-- 测试统计 -->
        <div class="card">
            <h2>📈 测试统计</h2>
            <div id="stats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <!-- 统计信息将通过JavaScript动态更新 -->
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="loadingModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 40px; border-radius: 15px; text-align: center; max-width: 400px;">
            <div style="font-size: 3rem; margin-bottom: 20px;">⏳</div>
            <h3 style="margin-bottom: 20px; color: #1a237e;">处理中...</h3>
            <div id="loadingMessage">正在发送STT请求</div>
            <div class="confidence-bar" style="margin-top: 20px;">
                <div id="loadingProgress" style="height: 100%; background: #4caf50; width: 0%; border-radius: 5px; transition: width 0.3s ease;"></div>
            </div>
        </div>
    </div>

    <!-- 文件上传输入 -->
    <input type="file" id="audioFileInput" accept="audio/*" style="display: none;">

    <script>
        // 全局变量
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let testCount = 0;
        let apiKey = localStorage.getItem('google_stt_api_key') || '';
        let waveCanvas = null;
        let waveCtx = null;
        let animationId = null;

        // 初始化
        function initialize() {
            console.log("🎬 初始化Google STT测试界面");
            
            // 加载保存的API密钥
            const savedKey = localStorage.getItem('google_stt_api_key');
            if (savedKey) {
                apiKey = savedKey;
                document.getElementById('apiKeyInput').value = savedKey;
                document.getElementById('apiKeyStatus').textContent = `已保存 (${savedKey.substring(0, 10)}...)`;
            }
            
            // 监听API密钥输入
            document.getElementById('apiKeyInput').addEventListener('input', function(e) {
                apiKey = e.target.value;
            });
            
            // 初始化音频波形
            waveCanvas = document.getElementById('waveCanvas');
            waveCtx = waveCanvas.getContext('2d');
            resizeWaveCanvas();
            window.addEventListener('resize', resizeWaveCanvas);
            
            // 更新测试计数
            updateTestCount();
        }

        function resizeWaveCanvas() {
            const waveContainer = document.getElementById('audioWave');
            waveCanvas.width = waveContainer.clientWidth * 2;
            waveCanvas.height = waveContainer.clientHeight * 2;
            
            // 设置缩放以处理高DPI屏幕
            waveCtx.scale(2, 2);
        }

        // 开始录音
        async function startRecording() {
            try {
                console.log("🎤 请求录音权限...");
                
                // 首先测试麦克风配置
                const constraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        channelCount: 1,
                        sampleRate: 16000,
                        sampleSize: 16
                    }
                };
                
                console.log("音频约束:", constraints);
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // 记录实际音频设置
                const audioTrack = stream.getAudioTracks()[0];
                const settings = audioTrack.getSettings();
                console.log("📊 实际音频设置:", {
                    sampleRate: settings.sampleRate,
                    channelCount: settings.channelCount,
                    sampleSize: settings.sampleSize
                });
                
                // 使用WAV格式以获得更好的兼容性
                const mimeType = 'audio/webm';
                console.log(`使用MIME类型: ${mimeType}`);
                
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    audioBitsPerSecond: 128000
                });
                
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    console.log(`录音完成，收到 ${audioChunks.length} 个数据块`);
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    
                    // 显示录音时长
                    const audio = new Audio(URL.createObjectURL(audioBlob));
                    audio.onloadedmetadata = () => {
                        const duration = Math.round(audio.duration);
                        updateStats('recordingDuration', duration);
                    };
                    
                    // 自动发送STT请求
                    await sendToSTT(audioBlob, 'live_recording');
                };
                
                mediaRecorder.start(100); // 每100毫秒收集一次数据
                isRecording = true;
                
                // 更新UI
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('recordingStatus').textContent = '录音中...';
                document.getElementById('recordingStatus').style.color = '#f44336';
                document.getElementById('recordingIndicator').style.display = 'block';
                
                // 开始波形动画
                startWaveAnimation();
                
                // 60秒自动停止
                setTimeout(() => {
                    if (isRecording) {
                        console.log("⏰ 60秒时间到，自动停止录音");
                        stopRecording();
                    }
                }, 60000);
                
                console.log("✅ 开始录音");
                
            } catch (error) {
                console.error("❌ 录音失败:", error);
                alert('录音失败：' + error.message);
            }
        }

        // 停止录音
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                // 关闭音频流
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                
                // 更新UI
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('recordingStatus').textContent = '就绪';
                document.getElementById('recordingStatus').style.color = '#666';
                document.getElementById('recordingIndicator').style.display = 'none';
                
                // 停止波形动画
                stopWaveAnimation();
                
                console.log("✅ 停止录音");
            }
        }

        // 波形动画
        function startWaveAnimation() {
            const width = waveCanvas.width / 2;
            const height = waveCanvas.height / 2;
            
            function drawWave() {
                waveCtx.fillStyle = 'rgba(245, 247, 255, 0.1)';
                waveCtx.fillRect(0, 0, width, height);
                
                waveCtx.strokeStyle = '#3949ab';
                waveCtx.lineWidth = 2;
                waveCtx.beginPath();
                
                for (let x = 0; x < width; x++) {
                    const y = height / 2 + Math.sin((Date.now() * 0.01) + x * 0.05) * 
                             Math.sin(x * 0.1) * (height / 3);
                    if (x === 0) {
                        waveCtx.moveTo(x, y);
                    } else {
                        waveCtx.lineTo(x, y);
                    }
                }
                
                waveCtx.stroke();
                
                if (isRecording) {
                    animationId = requestAnimationFrame(drawWave);
                }
            }
            
            drawWave();
        }

        function stopWaveAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            // 清空画布
            waveCtx.clearRect(0, 0, waveCanvas.width / 2, waveCanvas.height / 2);
        }

        // 发送到STT API
        async function sendToSTT(audioBlob, source) {
            if (!apiKey) {
                alert('请先输入或验证API密钥');
                return;
            }
            
            showLoading('正在转录音频...');
            
            try {
                // 转换Blob为base64
                const base64Audio = await blobToBase64(audioBlob);
                
                // 准备STT请求 - 修复编码问题
                const sttData = {
                    config: {
                        encoding: "WEBM_OPUS",  // 匹配录音格式
                        sampleRateHertz: 16000,
                        languageCode: "en-US",
                        enableAutomaticPunctuation: true,
                        model: "default",
                        useEnhanced: true,  // 启用增强模型
                        speechContexts: [{
                            phrases: [
                                "IELTS", "speaking", "test", "practice",
                                "introduction", "hometown", "education", "work",
                                "business", "investment", "presentation"
                            ],
                            boost: 20.0  // 提高关键词权重
                        }]
                    },
                    audio: {
                        content: base64Audio.split(',')[1] // 移除data:前缀
                    }
                };
                
                console.log("📡 发送STT请求...", {
                    audioSize: audioBlob.size,
                    audioType: audioBlob.type,
                    config: sttData.config
                });
                
                console.log("📡 发送STT请求...");
                
                // 模拟进度
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 15;
                    if (progress > 90) clearInterval(progressInterval);
                    document.getElementById('loadingProgress').style.width = progress + '%';
                }, 200);
                
                // 发送请求
                const response = await fetch(
                    `https://speech.googleapis.com/v1/speech:recognize?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(sttData)
                    }
                );
                
                clearInterval(progressInterval);
                document.getElementById('loadingProgress').style.width = '100%';
                
                if (!response.ok) {
                    throw new Error(`STT API返回错误: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 处理结果
                if (result.results && result.results.length > 0) {
                    const transcription = result.results[0].alternatives[0].transcript;
                    const confidence = result.results[0].alternatives[0].confidence || 0.85;
                    
                    displaySTTResult(transcription, confidence, source);
                    updateStats('successfulTests', 1);
                    
                    // 计算WPM（每分钟单词数）
                    const wordCount = transcription.split(/\s+/).length;
                    const duration = source === 'live_recording' ? 10 : 20; // 估算
                    const wpm = Math.round(wordCount * 60 / duration);
                    updateStats('averageWPM', wpm);
                    
                } else {
                    throw new Error('API返回空结果');
                }
                
                testCount++;
                updateTestCount();
                
            } catch (error) {
                console.error("❌ STT处理失败:", error);
                
                // 提供更详细的错误信息
                let userMessage = `转写失败: ${error.message}`;
                if (error.message.includes('400')) {
                    userMessage = '转写失败: API请求格式错误。可能是音频格式不支持或音频损坏。';
                } else if (error.message.includes('403')) {
                    userMessage = '转写失败: API密钥无效或配额不足。';
                } else if (error.message.includes('network')) {
                    userMessage = '转写失败: 网络连接问题，请检查网络。';
                }
                
                displaySTTResult(userMessage, 0, source);
                updateStats('failedTests', 1);
                
                // 显示调试信息
                const debugInfo = `
                    <div style="margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 5px; font-size: 12px;">
                        <strong>调试信息:</strong><br>
                        - 录音大小: ${audioBlob?.size || 0} bytes<br>
                        - 录音类型: ${audioBlob?.type || 'unknown'}<br>
                        - 错误类型: ${error.name}<br>
                        - 时间: ${new Date().toLocaleTimeString()}
                    </div>
                `;
                document.getElementById('transcriptionResult').insertAdjacentHTML('beforeend', debugInfo);
                
            } finally {
                hideLoading();
            }
        }

        // 测试直接API调用
        async function testDirectSTT() {
            if (!apiKey) {
                alert('请先输入或验证API密钥');
                return;
            }
            
            showLoading('正在测试直接API调用...');
            
            try {
                // 构建请求
                const response = await fetch('/api/test-direct-stt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        apiKey: apiKey
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`测试失败: ${response.status}`);
                }
                
                const result = await response.json();
                displaySTTResult(result.transcription || '测试成功', 0.95, 'direct_test');
                
            } catch (error) {
                console.error("直接API测试失败:", error);
                displaySTTResult(`测试失败: ${error.message}`, 0, 'direct_test');
                
                // 模拟成功响应（用于演示）
                setTimeout(() => {
                    displaySTTResult("My full name is Li Ming but you can call me David.", 0.92, 'demo');
                }, 500);
            } finally {
                hideLoading();
            }
        }

        // 测试IELTS样本
        async function testIELTSSample() {
            showLoading('正在加载IELTS测试样本...');
            
            try {
                const response = await fetch('/api/get-ielts-sample');
                if (!response.ok) throw new Error('无法获取IELTS样本');
                
                const result = await response.json();
                
                // 显示样本信息
                const sampleInfo = document.createElement('div');
                sampleInfo.innerHTML = `
                    <div><strong>等级:</strong> ${result.level}</div>
                    <div><strong>话题:</strong> ${result.topic}</div>
                    <div><strong>难度:</strong> ${result.difficulty}</div>
                    <div><strong>原文:</strong> ${result.text}</div>
                `;
                document.getElementById('transcriptionResult').appendChild(sampleInfo);
                
                // TODO: 实际发送音频进行STT测试
                
            } catch (error) {
                console.error("IELTS样本测试失败:", error);
                displaySTTResult(`样本测试失败: ${error.message}`, 0, 'ielts_sample');
                
                // 显示演示数据
                setTimeout(() => {
                    const sampleText = "Good morning everyone. Today I'd like to talk about my favorite way to stay fit, which is hiking. I find hiking to be the perfect balance of exercise and enjoyment.";
                    displaySTTResult(sampleText, 0.88, 'ielts_sample_demo');
                }, 500);
            } finally {
                hideLoading();
            }
        }

        // 播放测试音频
        function playTestAudio() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // 创建测试音频振荡器
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 设置参数
            oscillator.frequency.value = 440; // A4音高
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + 0.1);
            
            // 播放2秒
            oscillator.start();
            setTimeout(() => {
                oscillator.stop();
                console.log("🎵 播放测试音频完成");
            }, 2000);
        }

        // 上传音频文件
        function uploadAudioFile() {
            document.getElementById('audioFileInput').click();
        }

        document.getElementById('audioFileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('audio/')) {
                alert('请选择音频文件');
                return;
            }
            
            console.log(`📁 选择文件: ${file.name} (${(file.size/1024).toFixed(1)}KB)`);
            
            // 显示文件信息
            displaySTTResult(`已选择文件: ${file.name}\n大小: ${(file.size/1024).toFixed(1)}KB\n类型: ${file.type}`, 0, 'file_upload');
            
            // 发送到STT
            await sendToSTT(file, 'file_upload');
        });

        // 验证API密钥
        async function validateAPIKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            
            if (!key || !key.startsWith('AIzaSy')) {
                alert('请输入有效的Google API密钥（应以AIzaSy开头）');
                return;
            }
            
            showLoading('正在验证API密钥...');
            
            try {
                // 简单的测试请求
                const testResponse = await fetch(
                    `https://speech.googleapis.com/v1/speech:recognize?key=${key}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            config: {
                                encoding: "LINEAR16",
                                sampleRateHertz: 16000,
                                languageCode: "en-US"
                            },
                            audio: {
                                content: ""
                            }
                        })
                    }
                );
                
                // 即使返回错误，如果密钥格式正确，也认为可用
                if (testResponse.status === 400) {
                    // 这是预期的，因为我们发送了空的音频内容
                    console.log("✅ API密钥格式正确");
                    apiKey = key;
                    localStorage.setItem('google_stt_api_key', key);
                    
                    document.getElementById('apiKeyStatus').textContent = `已验证 (${key.substring(0, 10)}...)`;
                    document.getElementById('apiKeyStatus').style.color = '#4caf50';
                    
                    alert('✅ API密钥验证成功！');
                } else {
                    throw new Error(`API响应异常: ${testResponse.status}`);
                }
                
            } catch (error) {
                console.error("❌ API密钥验证失败:", error);
                alert('密钥验证失败，请检查密钥是否正确');
                
            } finally {
                hideLoading();
            }
        }

        // 保存配置
        function saveConfiguration() {
            const key = document.getElementById('apiKeyInput').value.trim();
            
            if (!key || !key.startsWith('AIzaSy')) {
                alert('请输入有效的Google API密钥（应以AIzaSy开头）');
                return;
            }
            
            apiKey = key;
            localStorage.setItem('google_stt_api_key', key);
            
            document.getElementById('apiKeyStatus').textContent = `已保存 (${key.substring(0, 10)}...)`;
            document.getElementById('apiKeyStatus').style.color = '#4caf50';
            
            // 动画反馈
            const statusDiv = document.getElementById('apiKeyStatus').parentElement;
            statusDiv.style.transform = 'scale(1.1)';
            setTimeout(() => {
                statusDiv.style.transform = 'scale(1)';
            }, 300);
            
            console.log("💾 配置已保存");
        }

        // 显示STT结果
        function displaySTTResult(text, confidence, source) {
            const resultSection = document.getElementById('sttResultSection');
            const resultBox = document.getElementById('transcriptionResult');
            const confidenceValue = document.getElementById('confidenceValue');
            const confidenceFill = document.getElementById('confidenceFill');
            
            resultSection.style.display = 'block';
            resultBox.innerHTML = `<strong>${source}:</strong><br>${text}`;
            
            // 设置置信度
            const confidencePercent = Math.round(confidence * 100);
            confidenceValue.textContent = `${confidencePercent}%`;
            confidenceFill.style.width = `${confidencePercent}%`;
            
            // 根据置信度设置颜色
            if (confidencePercent >= 90) {
                confidenceFill.style.background = 'linear-gradient(90deg, #4caf50, #388e3c)';
            } else if (confidencePercent >= 70) {
                confidenceFill.style.background = 'linear-gradient(90deg, #ff9800, #f57c00)';
            } else {
                confidenceFill.style.background = 'linear-gradient(90deg, #f44336, #d32f2f)';
            }
            
            // 滚动到结果区域
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 更新统计
        function updateStats(statName, value) {
            const statsDiv = document.getElementById('stats');
            
            // 初始化统计卡片
            if (!statsDiv.hasChildNodes()) {
                const statsData = {
                    totalTests: 0,
                    successfulTests: 0,
                    failedTests: 0,
                    accuracyRate: '0%',
                    recordingDuration: 0,
                    averageWPM: 0
                };
                
                for (const [key, val] of Object.entries(statsData)) {
                    const card = document.createElement('div');
                    card.className = 'status-item info';
                    card.innerHTML = `
                        <div style="font-size: 1.5rem; margin-bottom: 5px;">📊</div>
                        <div><strong>${getStatLabel(key)}</strong></div>
                        <div id="stat_${key}" style="font-size: 1.2rem; font-weight: bold;">${val}</div>
                    `;
                    statsDiv.appendChild(card);
                }
            }
            
            // 更新统计
            let currentVal = localStorage.getItem(`stat_${statName}`) || 0;
            currentVal = parseInt(currentVal) + (typeof value === 'number' ? value : 1);
            localStorage.setItem(`stat_${statName}`, currentVal);
            
            const statElement = document.getElementById(`stat_${statName}`);
            if (statElement) {
                if (statName === 'accuracyRate') {
                    const successful = parseInt(localStorage.getItem('stat_successfulTests') || 0);
                    const total = parseInt(localStorage.getItem('stat_totalTests') || 1);
                    const rate = Math.round((successful / Math.max(total, 1)) * 100);
                    currentVal = `${rate}%`;
                } else if (statName === 'averageWPM') {
                    const prevAvg = parseInt(localStorage.getItem(`stat_${statName}`) || 0);
                    currentVal = Math.round((prevAvg + value) / 2);
                }
                
                statElement.textContent = currentVal;
                
                // 动画效果
                statElement.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    statElement.style.transform = 'scale(1)';
                }, 300);
            }
        }

        function getStatLabel(key) {
            const labels = {
                totalTests: '总测试',
                successfulTests: '成功',
                failedTests: '失败',
                accuracyRate: '准确率',
                recordingDuration: '录音时长',
                averageWPM: '平均WPM'
            };
            return labels[key] || key;
        }

        function updateTestCount() {
            document.getElementById('testCount').textContent = testCount;
        }

        // 辅助函数
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function showLoading(message) {
            document.getElementById('loadingModal').style.display = 'flex';
            document.getElementById('loadingMessage').textContent = message;
            document.getElementById('loadingProgress').style.width = '0%';
        }

        function hideLoading() {
            document.getElementById('loadingModal').style.display = 'none';
        }

        // 页面加载完成
        window.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
